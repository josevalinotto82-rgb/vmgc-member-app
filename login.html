<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#166534">
    <meta charset="UTF-8">
    <title>Login - Villa María Golf</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js?v=4"></script>
</head>

<body>
    <div class="card">

        <img src="escudo.png" alt="Villa María Golf Club" class="logo-login">

        <h2>Ingreso VMGC</h2>

        <form id="loginForm">
            <input id="email" type="email" placeholder="Email" required autocomplete="email">

            <input id="password" type="password" placeholder="Contraseña" required autocomplete="current-password"
                onkeydown="if(event.key==='Enter'){document.getElementById('loginForm').requestSubmit();}">

            <button id="loginBtn" type="submit">Ingresar</button>
        </form>

        <div class="link-box">
            <a href="registro.html">Registrarse por primera vez</a>
        </div>

        <div class="link-box small">
            <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
        </div>

        <div id="msg" class="error"></div>
    </div>

    <script>

        async function checkSession() {

            const { data } = await db.auth.getSession();

            if (data.session) {
                window.location.href = "panel.html";
            }
        }

        checkSession();

        const emailEl = document.getElementById("email");
        const passwordEl = document.getElementById("password");
        const loginBtn = document.getElementById("loginBtn");
        const loginForm = document.getElementById("loginForm");
        const msg = document.getElementById("msg");

        async function hacerLogin() {
            msg.textContent = "";

            const email = emailEl.value.trim();
            const password = passwordEl.value;

            if (!email || !password) {
                msg.textContent = "Ingresá email y contraseña.";
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = "Ingresando...";

            const { error } = await db.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                msg.textContent = error.message;
                loginBtn.disabled = false;
                loginBtn.textContent = "Ingresar";
                return;
            }

            window.location.href = "panel.html";
        }

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            await hacerLogin();
        });
    </script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", async () => {
                try {
                    const registration = await navigator.serviceWorker.register(
                        "/sw.js?v=8",
                        { scope: "/" }
                    );

                    await registration.update();

                    console.log(
                        "Service Worker activo:",
                        registration.scope
                    );
                } catch (error) {
                    console.error(
                        "No se pudo registrar el Service Worker:",
                        error
                    );
                }
            });
        }
    </script>
</body>

</html>
