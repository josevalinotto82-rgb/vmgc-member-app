        <div class="manual-form">
          <input id="m-nombre-${slotId}" placeholder="Nombre *" />
          <input id="m-apellido-${slotId}" placeholder="Apellido *" />  
          <input id="m-index-${slotId}" placeholder="Índice" />
          <select id="m-genero-${slotId}">
            <option value="">Género *</option>
            <option value="male">Caballero</option>
            <option value="female">Dama</option>
          </select>
          <input id="m-pais-${slotId}" placeholder="País" />
          <button data-save-manual="${slotId}">${modoPareja ? "Guardar compañero" : "Guardar"}</button>
        </div>
      `;
    }

    function ensureInlineSearch(slotId) {
        const input = document.getElementById(`input-${slotId}`);
        const results = document.getElementById(`results-${slotId}`);
        if (!input || input.dataset.autoSearchInstalled === "1") return;

        input.dataset.autoSearchInstalled = "1";

        input.addEventListener("input", () => {
            const texto = String(input.value || "").trim();
            window.clearTimeout(state.searchDebounceTimers[slotId]);

            if (!texto) {
                if (results) results.innerHTML = "";
                return;
            }

            if (texto.length < 3) {
                if (results) results.innerHTML = `<div class="helper-text">Escribí al menos 2 caracteres.</div>`;
                return;
            }

            state.searchDebounceTimers[slotId] = window.setTimeout(async () => {
                try {
                    const jugadores = await searchPlayers(texto);
                    renderSearchResults(slotId, jugadores);
                } catch (error) {
                    console.error(error);
                    if (results) results.innerHTML = `<div class="error">Error al buscar.</div>`;
                }
            }, CONFIG.SEARCH_DEBOUNCE_MS);
        });
    }

    async function closeAllInlineEditors() {
        const editores = document.querySelectorAll(".slot-inline-editor");
        for (const el of editores) {
            if (el.style.display === "block") {
                const slotId = el.id.replace("inline-", "");
                el.style.display = "none";
                await unlockLineFromSlot(slotId);
            }
        }
    }

    function resetInlineState(slotId) {
        const results = document.getElementById(`results-${slotId}`);
        const manualWrap = document.getElementById(`manual-${slotId}`);
        const input = document.getElementById(`input-${slotId}`);
        if (results) results.innerHTML = "";
        if (manualWrap) {
            manualWrap.style.display = "none";
            manualWrap.innerHTML = "";
        }
        if (input) {
            input.dataset.modoPareja = "0";
            input.dataset.jugadorBaseId = "";
        }
    }

    async function openInline(slotId) {
        await closeAllInlineEditors();
        const editor = document.getElementById(`inline-${slotId}`);
        if (!editor) return;
        editor.style.display = "block";

        ensureInlineSearch(slotId);
        resetInlineState(slotId);

        const input = document.getElementById(`input-${slotId}`);
        const results = document.getElementById(`results-${slotId}`);
        if (input) {
            input.value = "";
            input.dataset.modoPareja = requiresPartner() ? "1" : "0";
            input.dataset.jugadorBaseId = "";
        }
        if (results && requiresPartner()) {
            results.innerHTML = `<div class="helper-text">Buscá el primer jugador de la pareja. Después te pedirá el compañero.</div>`;
        }
    }

    async function closeInline(slotId) {
        const editor = document.getElementById(`inline-${slotId}`);
        if (editor) editor.style.display = "none";
        await unlockLineFromSlot(slotId);
    }

    function renderInlineEditor(slotId) {
        return `
        <div class="slot-inline-editor" id="inline-${slotId}" style="display:none;">
          <div class="slot-inline-top">
            <input class="slot-inline-input" id="input-${slotId}" placeholder="Buscar por nombre o matrícula" />
            <button class="slot-inline-close" data-close-inline="${slotId}">×</button>
          </div>
          <div class="slot-inline-actions">
            <button class="slot-inline-manual-btn" data-manual-inline="${slotId}">Carga manual</button>
          </div>
          <div class="slot-inline-results" id="results-${slotId}"></div>
          <div class="slot-inline-manual-wrap" id="manual-${slotId}" style="display:none;"></div>
        </div>
      `;
    }

    function renderFreeSlot(slot, torneoAbierto, bloqueadoPorOtro) {
        const participantType = String(slot?.participant_type || "");

        const textoLibre = !torneoAbierto
            ? (state.torneo.status === "closed" ? "Cerrado" : "Finalizado")
            : (bloqueadoPorOtro ? "Reservado" : "Libre");

        if (participantType === "blocked") {
            return `
    <td class="slot-cell slot-occupied slot-blocked" data-slot-id="${slot.id}" data-libre="0">
      <div class="slot-box"></div>
    </td>
  `;
        }

        if (!torneoAbierto) {
            return `
        <td class="slot-cell slot-empty">
          <div class="slot-box"><span class="slot-libre-link" style="text-decoration:none; cursor:default;">${textoLibre}</span></div>
        </td>
      `;
        }

        if (bloqueadoPorOtro) {
            const esReserva24 =
                String(slot?.notes || "") === "RESERVA_24H_SOCIO" &&
                lockActive(slot);

            if (APP.esAdmin && esReserva24) {
                return `
      <td class="slot-cell slot-empty slot-locked-other" data-slot-id="${slot.id}">
        <div class="slot-box">
          <button
            class="slot-inline-manual-btn"
            type="button"
            data-release-reserve-slot="${slot.id}"
          >
            Liberar reserva
          </button>
        </div>
      </td>
    `;
            }

            return `
    <td class="slot-cell slot-empty slot-locked-other">
      <div class="slot-box"><span class="slot-libre-link" style="text-decoration:none; cursor:not-allowed;">Reservado</span></div>
    </td>
  `;
        }

        const botonBloquear = APP.esAdmin
            ? `<button type="button" class="slot-block-btn" data-block-slot="${slot.id}" title="Bloquear slot">×</button>`
            : "";

        const botonAnotarme = !APP.esAdmin && APP.miPlayerId && !state.playerAlreadyRegistered
            ? `<button class="slot-self-btn" data-self-slot="${slot.id}">Anotarme</button>`
            : "";

        const botonReservar = puedeReservarSlotDeSuLinea(slot) && !esReservaMia(slot)
            ? `<button class="slot-self-btn" type="button" data-reserve-slot="${slot.id}">Reservar 24 hs</button>`
            : "";

        const botonLiberarReserva = esReservaMia(slot)
            ? `<button class="slot-inline-manual-btn" type="button" data-release-reserve-slot="${slot.id}">Liberar reserva</button>`
            : "";

        const botonAgregarJugador = `<span class="slot-libre-link" data-open-inline="${slot.id}">Agregar jugador</span>`;

        const accionesSlotLibre = `
      <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
        ${botonAnotarme}
        ${botonReservar}
        ${botonLiberarReserva}
        ${botonAgregarJugador}
      </div>
    `;

        return `
      <td class="slot-cell slot-empty" data-slot-id="${slot.id}" data-slot-number="${slot.slot_number}" data-libre="1">
        <div class="slot-box">
          ${botonBloquear}
          ${accionesSlotLibre}
        </div>
      </td>
    `;
    }

    function renderOccupiedSlot(line, slot, cssLockClass) {
        const participantType = String(slot?.participant_type || "");

        const indicator = participantType === "self"
            ? `<div class="slot-indicator slot-indicator-self"></div>`
            : participantType === "guest"
                ? `<div class="slot-indicator slot-indicator-guest"></div>`
                : participantType === "admin"
                    ? `<div class="slot-indicator slot-indicator-admin"></div>`
                    : "";

        const textoCompleto = participantType === "blocked"
            ? ""
            : normalizeSlotName(slot);

        const texto = participantType === "blocked"
            ? ""
            : formatNombreCorto(textoCompleto);

        const typeClass = getSlotCssType(slot);
        const dragClass = APP.esAdmin ? "slot-draggable" : "";

        return `
        <td
          class="slot-cell slot-occupied ${typeClass} ${cssLockClass} ${dragClass}"
          data-slot-id="${slot.id}"
          data-hora="${safeText(timeText(line.line_time))}"
          data-hoyo="${safeText(line.label || line.starting_hole)}"
          data-slot-number="${slot.slot_number}"
          data-texto="${safeText(texto)}"
          data-libre="0"
          draggable="${APP.esAdmin ? "true" : "false"}"
        >
          <div class="slot-box" title="${safeText(textoCompleto)}">
            <div class="slot-nombre">${safeText(texto)}</div>
            ${indicator}
          </div>
        </td>
      `;
    }

    function renderLineRow(line) {
        const lineSlots = getLineSlots(line.id);
        const lineByNumber = new Map(lineSlots.map((slot) => [slot.slot_number, slot]));
        const lineLockedByOther = lineSlots.some(lockIsOther);
        const lineLockedByMine = isTournamentOpen() && lineSlots.some(lockIsMine);
        const hourClass = lineLockedByOther ? "slot-locked-other" : (lineLockedByMine ? "slot-locked-mine" : "");
        const torneoAbierto = isTournamentOpen();

        const firstColumnText = isSimultaneousTournament()
            ? formatSimultaneousHoleLabel(line)
            : timeText(line.line_time);

        let row = `<tr><td class="col-hora ${hourClass}">${safeText(firstColumnText)}</td>`;

        for (let i = 1; i <= CONFIG.SLOT_COUNT; i += 1) {
            const slot = lineByNumber.get(i) || {
                id: "",
                slot_number: i,
                starting_line_id: line.id,
                display_name: "",
                participant_type: "empty",
            };

            const slotBloqueadoPorOtro = lockIsOther(slot) || !torneoAbierto;
            const slotBloqueadoPorMi = torneoAbierto && lockIsMine(slot);

            const cssLockClass = slotBloqueadoPorOtro
                ? "slot-locked-other"
                : (slotBloqueadoPorMi ? "slot-locked-mine" : "");

            row += isSlotEmpty(slot)
                ? renderFreeSlot(slot, torneoAbierto, slotBloqueadoPorOtro)
                : renderOccupiedSlot(line, slot, cssLockClass);
        }

        if (state.showAdminSequentialTimes) {
            row += `
          <td class="admin-time-cell">${safeText(getPaso9Hoyos(line.line_time))}</td>
          <td class="admin-time-cell">${safeText(getFinJuego(line.line_time))}</td>
        `;
        }

        row += `</tr>`;
        return row;
    }

    function renderBlock(block) {
        const lines = sortLinesForDisplay(
            state.lines.filter((line) => line.starting_block_id === block.id)
        );

        let html = `
        <div class="card bloque-card">
          <div class="bloque-header">
          </div>
          <div class="tabla-wrap">
            <table>
              <colgroup>
                <col class="col-hora" />
                <col class="col-slot" />
                <col class="col-slot" />
                <col class="col-slot" />
                <col class="col-slot" />
                ${state.showAdminSequentialTimes ? `
                  <col class="col-admin-time" />
                  <col class="col-admin-time" />
                ` : ""}
              </colgroup>
              <tbody>
      `;

        if (isSimultaneousTournament()) {
            html += `
          <tr>
            <td colspan="${state.showAdminSequentialTimes ? 7 : 5}" class="titulo-hoyo">
              Salida ${safeText(timeText(block.start_time))}
            </td>
          </tr>
        `;

            for (const line of lines) {
                html += renderLineRow(line);
            }
        } else {
            let lastHole = null;

            for (let index = 0; index < lines.length; index += 1) {
                const line = lines[index];
                const nextLine = lines[index + 1] || null;
                const hole = Number(line.starting_hole || 0);

                if (!isSimultaneousTournament() && hole !== lastHole) {
                    html += `<tr><td colspan="${state.showAdminSequentialTimes ? 7 : 5}" class="titulo-hoyo">Salida por Hoyo ${safeText(hole)}</td></tr>`;
                    lastHole = hole;
                }

                html += renderLineRow(line);

                if (!isSimultaneousTournament() && nextLine) {
                    const sameHole =
                        Number(nextLine.starting_hole || 0) === Number(line.starting_hole || 0);

                    if (sameHole) {
                        const currentMinutes = timeTextToMinutes(line.line_time);
                        const nextMinutes = timeTextToMinutes(nextLine.line_time);

                        if (currentMinutes !== null && nextMinutes !== null) {
                            const diff = nextMinutes - currentMinutes;

                            if (diff > 30) {
                                html += `
            <tr>
              <td colspan="${state.showAdminSequentialTimes ? 7 : 5}" class="gap-row"></td>
            </tr>
          `;
                            }
                        }
                    }
                }
            }
        }

        html += `</tbody></table></div></div>`;
        return html;
    }

    function renderShareGrid() {
        const isSim = String(state.torneo?.start_type || "").toLowerCase() === "simultanea";

        let html = `
      <div class="share-sheet">
        <div class="share-header">
          <div class="share-title">${safeText(state.torneo?.name || "Torneo")}</div>
          <div class="share-sub">
            ${formatFechaLargaCapitalizada(state.torneo?.tournament_date)}
          </div>
        </div>

        <table>
          <colgroup>
            <col class="share-col-ref" />
            <col class="share-slot" />
            <col class="share-slot" />
            <col class="share-slot" />
            <col class="share-slot" />
            ${state.showAdminSequentialTimes ? `
              <col class="share-col-time-extra" />
              <col class="share-col-time-extra" />
            ` : ""}
          </colgroup>
          <tbody>
    `;

        const lines = sortLinesForDisplay(state.lines);

        let lastHole = null;

        for (let index = 0; index < lines.length; index += 1) {
            const line = lines[index];
            const nextLine = lines[index + 1] || null;
            const hole = Number(line.starting_hole || 0);

            if (!isSim && hole !== lastHole) {
                html += `
      <tr>
        <td colspan="${state.showAdminSequentialTimes ? 7 : 5}" class="share-title-row">
          Salida por Hoyo ${hole}
        </td>
      </tr>
    `;
                lastHole = hole;
            }

            const ref = isSim
                ? formatSimultaneousHoleLabel(line)
                : timeText(line.line_time);

            html += `<tr>`;
            html += `<td class="share-col-ref">${safeText(ref)}</td>`;

            const lineSlots = getLineSlots(line.id);
            const byNumber = new Map(lineSlots.map((s) => [s.slot_number, s]));

            for (let i = 1; i <= CONFIG.SLOT_COUNT; i += 1) {
                const slot = byNumber.get(i);

                const participantType = String(slot?.participant_type || "").toLowerCase();
                const isBlocked = participantType === "blocked";

                const isReserved =
                    slot &&
                    String(slot.notes || "") === "RESERVA_24H_SOCIO" &&
                    lockActive(slot);

                const nameCompleto = slot && !isSlotEmpty(slot) && !isBlocked && !isReserved
                    ? normalizeSlotName(slot)
                    : "";

                const name = nameCompleto
                    ? formatNombreCorto(nameCompleto)
                    : "";

                const cellClass = isBlocked
                    ? "share-blocked"
                    : isReserved
                        ? "share-reserved"
                        : name
                            ? ""
                            : "share-empty";

                const cellText = isBlocked
                    ? ""
                    : isReserved
                        ? "RESERVADO"
                        : safeText(name);

                html += `
  <td
    class="share-name ${cellClass}"
    title="${isReserved ? "Reservado" : safeText(nameCompleto)}"
  >
    ${cellText}
  </td>
`;
            }

            if (state.showAdminSequentialTimes) {
                html += `
      <td class="share-time-extra">${safeText(getPaso9Hoyos(line.line_time))}</td>
      <td class="share-time-extra">${safeText(getFinJuego(line.line_time))}</td>
    `;
            }

            html += `</tr>`;

            if (!isSim && nextLine) {
                const sameHole =
                    Number(nextLine.starting_hole || 0) === Number(line.starting_hole || 0);

                if (sameHole) {
                    const currentMinutes = timeTextToMinutes(line.line_time);
                    const nextMinutes = timeTextToMinutes(nextLine.line_time);

                    if (currentMinutes !== null && nextMinutes !== null) {
                        const diff = nextMinutes - currentMinutes;

                        if (diff > 30) {
                            html += `
            <tr>
              <td colspan="${state.showAdminSequentialTimes ? 7 : 5}" class="share-block-separator"></td>
            </tr>
          `;
                        }
                    }
                }
            }
        }

        html += `
        </tbody>
      </table>
    </div>
  `;

        return html;
    }

    function renderMobileBlock(block) {
        const lines = sortLinesForDisplay(
            state.lines.filter((line) => line.starting_block_id === block.id)
        );

        let html = `
    <div class="card bloque-card">
  `;

        if (isSimultaneousTournament()) {
            html += `
      <div class="mobile-line-card">
        <div class="mobile-line-head">
          <div class="mobile-line-title">Salida simultánea</div>
          <div class="mobile-line-meta">${safeText(timeText(block.start_time))}</div>
        </div>
      </div>
    `;
        }

        let lastHole = null;

        for (const line of lines) {
            const hole = Number(line.starting_hole || 0);

            if (!isSimultaneousTournament() && hole !== lastHole) {
                html += `
        <div class="titulo-hoyo" style="border-radius:12px; margin:10px 0;">
          Salida por Hoyo ${safeText(hole)}
        </div>
      `;
                lastHole = hole;
            }

            html += renderMobileLine(line);
        }

        html += `</div>`;
        return html;
    }

    function renderMobileLine(line) {
        const lineSlots = getLineSlots(line.id);
        const lineByNumber = new Map(lineSlots.map((slot) => [slot.slot_number, slot]));

        const torneoAbierto = isTournamentOpen();

        const lineLockedByOther = lineSlots.some(lockIsOther);
        const lineLockedByMine = torneoAbierto && lineSlots.some(lockIsMine);

        const mainTitle = isSimultaneousTournament()
            ? `Hoyo ${formatSimultaneousHoleLabel(line)}`
            : timeText(line.line_time);

        const meta = isSimultaneousTournament()
            ? timeText(line.line_time || state.blockByLineId.get(line.id)?.start_time)
            : `Hoyo ${line.starting_hole || ""}`;

        let html = `
    <div class="mobile-line-card ${lineLockedByOther ? "slot-locked-other" : ""} ${lineLockedByMine ? "slot-locked-mine" : ""}">
      <div class="mobile-line-head">
        <div class="mobile-line-title">${safeText(mainTitle)}</div>
        <div class="mobile-line-meta">
          ${safeText(meta)}
          ${state.showAdminSequentialTimes ? `<br>9 hoyos: ${safeText(getPaso9Hoyos(line.line_time))}<br>Fin: ${safeText(getFinJuego(line.line_time))}` : ""}
        </div>
      </div>

      <div class="mobile-slots">
  `;

        for (let i = 1; i <= CONFIG.SLOT_COUNT; i += 1) {
            const slot = lineByNumber.get(i) || {
                id: "",
                slot_number: i,
                starting_line_id: line.id,
                display_name: "",
                participant_type: "empty",
            };

            const slotBloqueadoPorOtro = lockIsOther(slot) || !torneoAbierto;
            const slotBloqueadoPorMi = torneoAbierto && lockIsMine(slot);

            const cssLockClass = slotBloqueadoPorOtro
                ? "slot-locked-other"
                : (slotBloqueadoPorMi ? "slot-locked-mine" : "");

            html += isSlotEmpty(slot)
                ? renderMobileFreeSlot(slot, torneoAbierto, slotBloqueadoPorOtro, cssLockClass)
                : renderMobileOccupiedSlot(line, slot, cssLockClass);
        }

        html += `
      </div>
    </div>
  `;

        return html;
    }

    function renderMobileFreeSlot(slot, torneoAbierto, slotBloqueadoPorOtro, cssLockClass = "") {
        const puedeReservar = puedeReservarSlotDeSuLinea(slot);
        const reservaMia = esReservaMia(slot);

        let acciones = "";

        if (reservaMia) {
            acciones = `
      <button class="mobile-btn-soft" type="button" data-release-reserve-slot="${slot.id}">
        Liberar reserva
      </button>
    `;
        } else if (slotBloqueadoPorOtro) {
            acciones = `<span class="helper-text">No disponible</span>`;
        } else if (torneoAbierto) {
            acciones = "";

            if (!APP.esAdmin && !state.playerAlreadyRegistered) {
                acciones += `
        <button class="mobile-btn-main" type="button" data-self-slot="${slot.id}">
          Anotarme
        </button>
      `;
            }

            acciones += `
        <button class="mobile-btn-soft" type="button" data-open-inline="${slot.id}">
          Agregar jugador
        </button>
      `;

            if (puedeReservar) {
                acciones += `
        <button class="mobile-btn-soft" type="button" data-reserve-slot="${slot.id}">
          Reservar 24 hs
        </button>
      `;
            }

            if (APP.esAdmin) {
                acciones += `
        <button class="mobile-btn-soft" type="button" data-block-slot="${slot.id}">
          Bloquear
        </button>
      `;
            }

            if (APP.esAdmin && mobileMoveSlotOrigen && String(mobileMoveSlotOrigen) !== String(slot.id)) {
                acciones += `
        <button class="mobile-btn-main" type="button" data-mobile-move-to="${slot.id}">
          Pegar acá
        </button>
      `;
            }
        }

        return `
    <div
      class="mobile-slot mobile-slot-empty ${cssLockClass}"
      data-slot-id="${slot.id}"
      data-slot-number="${slot.slot_number}"
      data-libre="1"
    >
      <div class="mobile-slot-top">
        <div class="mobile-slot-num">Lugar ${safeText(slot.slot_number)}</div>
      </div>

      <div class="mobile-slot-name mobile-slot-empty">Libre</div>

      <div class="mobile-actions">
        ${acciones}
      </div>
    </div>
  `;
    }

    function renderMobileOccupiedSlot(line, slot, cssLockClass = "") {
        const participantType = String(slot?.participant_type || "");
        const typeClass = getSlotCssType(slot);
        const textoCompleto = participantType === "blocked" ? "Bloqueado" : normalizeSlotName(slot);
        const texto = participantType === "blocked" ? "Bloqueado" : formatNombreCorto(textoCompleto);

        return `
    <div
      class="mobile-slot ${typeClass} ${cssLockClass}"
      data-slot-id="${slot.id}"
      data-hora="${safeText(timeText(line.line_time))}"
      data-hoyo="${safeText(line.label || line.starting_hole)}"
      data-slot-number="${slot.slot_number}"
      data-texto="${safeText(texto)}"
      data-libre="0"
      draggable="${APP.esAdmin ? "true" : "false"}"
    >
            <div class="mobile-slot-name" title="${safeText(textoCompleto)}">
        ${safeText(texto)}
      </div>

      ${APP.esAdmin && participantType !== "blocked" ? `
        <div class="mobile-actions">
          <button class="mobile-btn-soft" type="button" data-mobile-move-from="${slot.id}">
            Mover
          </button>
        </div>
      ` : ""}
    </div>
  `;
    }

    function renderView() {
        dom.torneoNombre.textContent = state.torneo?.name || "Sin nombre";
        setStatus(
            statusLabelFromTournament(state.torneo?.status),
            state.torneo?.status === "open" ? "ok" : "error"
        );

        if (!state.blocks.length) {
            dom.contenido.innerHTML = `<div class="card error">No hay bloques de salida cargados para este torneo.</div>`;
            setStatus("Sin bloques", "error");
            return;
        }

        dom.contenido.innerHTML = `
    <div class="desktop-grid">
      ${state.blocks.map(renderBlock).join("")}
    </div>

    <div class="mobile-grid">
      ${state.blocks.map(renderMobileBlock).join("")}
    </div>
  `;
    }

    // ==============================
    // Persistencia y acciones
    // ==============================
    async function deleteRegistrationsBySlotIds(slotIds) {
        if (!slotIds.length) return;
        const { error } = await db.from("registrations").delete().in("line_slot_id", slotIds);
        if (error) throw error;
    }

    async function createRegistration(payload) {
        const { data, error } = await db
            .from("registrations")
            .insert(payload)
            .select()
            .single();

        if (error) {
            console.error("ERROR INSERT registrations", { error, payload });
            throw error;
        }

        return data;
    }

    async function createManualPlayer({ nombre, apellido, current_index, genero, pais }) {

        const first_name = String(nombre || "").trim();
        const last_name = String(apellido || "").trim();

        if (!first_name) throw new Error("El nombre es obligatorio.");
        if (!last_name) throw new Error("El apellido es obligatorio.");
        if (!["male", "female"].includes(genero)) {
            throw new Error("El género es obligatorio.");
        }

        const search_text =
            `${last_name} ${first_name} ${first_name} ${last_name}`
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toUpperCase();

        const { data, error } = await db
            .from("players")
            .insert({
                first_name,
                last_name,
                current_index,
                gender: genero,
                country: pais || null,

                is_club_member: false,
                is_aag_active: false,

                source: "manual",
                aag_member_number: null,

                search_text
            })
            .select()
            .single();

        if (error) throw error;

        return data;
    }

    async function occupySlotWithPlayer(slotId, jugador, registrationFallbackType = "aag_match") {
        setStatus("Guardando jugador...");

        const slotActual = await fetchSlotById(slotId);
        await validateSlotPriority(slotId);
        if (!isSlotEmpty(slotActual)) throw new Error("El casillero ya no está libre.");

        validateOwnGroupLimit(1);
        await validatePlayerNotDuplicated(jugador.id);

        const lineId = slotActual.starting_line_id;
        const slotPayload = buildSlotPayloadFromPlayer(jugador, participantTypeForGrid(jugador));

        await deleteRegistrationsBySlotIds([slotId]);

        console.log("REGISTRO A CREAR:", {
            nombre: jugador.full_name,
            matricula: jugador.aag_member_number,
            jugador
        });

        await createRegistration({
            tournament_id: state.torneo.id,
            starting_line_id: lineId,
            line_slot_id: slotId,
            linked_player_id: jugador.id,
            created_by_player_id: APP.miPlayerId || null,
            display_name: jugador.full_name,
            participant_type: registrationTypeForPlayer(jugador, registrationFallbackType),
            aag_member_number: jugador.aag_member_number || null,
            club_name: jugador.club_name || null,
            country: jugador.country || null,
            reported_index: jugador.current_index ?? null,
            registration_status: "pending",
            needs_admin_review: !jugador.aag_member_number,
        });

        const { error: updateError } = await db
            .from("line_slots")
            .update(slotPayload)
            .eq("id", slotId);

        if (updateError) throw updateError;

        await unlockLineFromSlot(slotId);

        const slotActualizado = await fetchSlotById(slotId);

        const index = state.slots.findIndex(s => String(s.id) === String(slotId));
        if (index !== -1) {
            state.slots[index] = slotActualizado;
        }

        rebuildIndexes();
        state.playerAlreadyRegistered = await fetchPlayerAlreadyRegistered(state.torneo.id);

        const popup = document.getElementById("playerSearchPopup");
        if (popup) popup.classList.add("hidden");

        renderView();
        setStatus("Jugador agregado correctamente.", "ok");
    }

    async function linkPartnerRegistrations(registrationId1, registrationId2) {
        const { error: error1 } = await db.from("registrations").update({ partner_registration_id: registrationId2 }).eq("id", registrationId1);
        if (error1) throw error1;
        const { error: error2 } = await db.from("registrations").update({ partner_registration_id: registrationId1 }).eq("id", registrationId2);
        if (error2) throw error2;
    }

    async function occupySlotWithPair(slotId, jugador1, jugador2) {
        setStatus("Guardando pareja...");

        const slotActual = await fetchSlotById(slotId);
        await validateSlotPriority(slotId);

        const bloque = getPartnerBlock(slotActual.slot_number);
        if (!bloque) throw new Error("No se pudo determinar el bloque de pareja.");

        validateOwnGroupLimit(2);
        await validatePlayerNotDuplicated(jugador1.id);
        await validatePlayerNotDuplicated(jugador2.id);

        const slotsLinea = await fetchLineSlotsFresh(slotActual.starting_line_id);
        const slot1 = slotsLinea.find((s) => s.slot_number === bloque.inicio);
        const slot2 = slotsLinea.find((s) => s.slot_number === bloque.fin);
        if (!slot1 || !slot2) throw new Error("No se encontraron ambos casilleros de la pareja.");
        const slot1Ocupado = !isSlotEmpty(slot1) && String(slot1.id) !== String(slotId);
        const slot2Ocupado = !isSlotEmpty(slot2) && String(slot2.id) !== String(slotId);

        if (slot1Ocupado || slot2Ocupado) {
            throw new Error(`Para anotar una pareja, los casilleros ${bloque.inicio}-${bloque.fin} deben estar ambos libres.`);
        }

        const payload1 = buildSlotPayloadFromPlayer(jugador1, participantTypeForGrid(jugador1));
        const payload2 = buildSlotPayloadFromPlayer(jugador2, participantTypeForGrid(jugador2));

        console.log("REG1:", jugador1);
        console.log("REG2:", jugador2);

        await deleteRegistrationsBySlotIds([slot1.id, slot2.id]);

        const reg1 = await createRegistration({
            tournament_id: state.torneo.id,
            starting_line_id: slotActual.starting_line_id,
            line_slot_id: slot1.id,
            linked_player_id: jugador1.id,
            created_by_player_id: APP.miPlayerId || null,
            display_name: jugador1.full_name,
            participant_type: registrationTypeForPlayer(jugador1, "aag_match"),
            aag_member_number: jugador1.aag_member_number || null,
            club_name: jugador1.club_name || null,
            country: jugador1.country || null,
            reported_index: jugador1.current_index ?? null,
            registration_status: "pending",
            needs_admin_review: !jugador1.aag_member_number,
        });

        const reg2 = await createRegistration({
            tournament_id: state.torneo.id,
            starting_line_id: slotActual.starting_line_id,
            line_slot_id: slot2.id,
            linked_player_id: jugador2.id,
            created_by_player_id: APP.miPlayerId || null,
            display_name: jugador2.full_name,
            participant_type: registrationTypeForPlayer(jugador2, "aag_match"),
            aag_member_number: jugador2.aag_member_number || null,
            club_name: jugador2.club_name || null,
            country: jugador2.country || null,
            reported_index: jugador2.current_index ?? null,
            registration_status: "pending",
            needs_admin_review: !jugador2.aag_member_number,
        });

        await linkPartnerRegistrations(reg1.id, reg2.id);

        const { error: updateError1 } = await db
            .from("line_slots")
            .update(payload1)
            .eq("id", slot1.id);

        if (updateError1) throw updateError1;

        const { error: updateError2 } = await db
            .from("line_slots")
            .update(payload2)
            .eq("id", slot2.id);

        if (updateError2) throw updateError2;

        await unlockLineFromSlot(slotId);
        await cerrarBuscadorJugador();
        await loadGrid();
    }

    async function releaseSlot(slotId) {
        if (!slotId) return;
        setStatus("Liberando lugar...");

        const slot = await fetchSlotById(slotId);
        const esMio = !!slot.linked_player_id && slot.linked_player_id === APP.miPlayerId;
        const loCreeYo = !!slot.created_by_player_id && slot.created_by_player_id === APP.miPlayerId;
        const puedeBorrar = APP.esAdmin || esMio || loCreeYo;
        if (!puedeBorrar) throw new Error("No tenés permiso para borrar este jugador.");

        let slotsALiberar = [slot.id];
        if (requiresPartner()) {
            const bloque = getPartnerBlock(slot.slot_number);
            if (bloque) {
                const slotsLinea = await fetchLineSlotsFresh(slot.starting_line_id);
                slotsALiberar = slotsLinea
                    .filter((s) => s.slot_number === bloque.inicio || s.slot_number === bloque.fin)
                    .map((s) => s.id);
            }
        }

        slotsALiberar = [...new Set(slotsALiberar)];
        await deleteRegistrationsBySlotIds(slotsALiberar);

        const { error } = await db
            .from("line_slots")
            .update(buildSlotResetPayload())
            .in("id", slotsALiberar);
        if (error) throw error;

        await loadGrid();
    }

    async function moveSlotAdmin(slotOrigenId, slotDestinoId) {
        if (!APP.esAdmin) throw new Error("Solo el administrador puede mover jugadores.");
        if (!slotOrigenId || !slotDestinoId) throw new Error("Falta origen o destino.");
        if (slotOrigenId === slotDestinoId) return true;

        const slotOrigen = await fetchSlotById(slotOrigenId);
        const slotDestino = await fetchSlotById(slotDestinoId);
        if (!slotOrigen || !slotDestino) throw new Error("No se encontraron los slots.");
        if (isSlotEmpty(slotOrigen)) throw new Error("El slot origen está libre.");

        let origenes = [slotOrigen];
        let destinos = [slotDestino];

        if (!requiresPartner()) {
            if (!isSlotEmpty(slotDestino)) throw new Error("El slot destino no está libre.");
        } else {
            const bloqueOrigen = getPartnerBlock(slotOrigen.slot_number);
            const bloqueDestino = getPartnerBlock(slotDestino.slot_number);
            if (!bloqueOrigen || !bloqueDestino) throw new Error("No se pudo determinar el bloque de pareja.");

            const slotsOrigenLinea = await fetchLineSlotsFresh(slotOrigen.starting_line_id);
            const slotsDestinoLinea = await fetchLineSlotsFresh(slotDestino.starting_line_id);

            origenes = slotsOrigenLinea.filter((s) => s.slot_number === bloqueOrigen.inicio || s.slot_number === bloqueOrigen.fin).sort((a, b) => a.slot_number - b.slot_number);
            destinos = slotsDestinoLinea.filter((s) => s.slot_number === bloqueDestino.inicio || s.slot_number === bloqueDestino.fin).sort((a, b) => a.slot_number - b.slot_number);

            if (destinos.some((slot) => !isSlotEmpty(slot))) {
                throw new Error("El bloque destino de pareja no está completamente libre.");
            }
        }

        const updateRegistrationDestinations = [];
        for (let i = 0; i < origenes.length; i += 1) {
            const origen = origenes[i];
            const destino = destinos[i];
            if (!destino) throw new Error("No se encontró el destino correspondiente.");

            const { error: copyError } = await db.from("line_slots").update({
                participant_type: origen.participant_type,
                created_by_player_id: origen.created_by_player_id,
                linked_player_id: origen.linked_player_id,
                display_name: origen.display_name,
                aag_member_number: origen.aag_member_number,
                club_name: origen.club_name,
                country: origen.country,
                manual_index: origen.manual_index,
                needs_admin_review: origen.needs_admin_review,
                notes: origen.notes,
                locked_by_session: null,
                locked_by_player_id: null,
                lock_expires_at: null,
            }).eq("id", destino.id);
            if (copyError) throw copyError;

            const { error: clearError } = await db.from("line_slots").update(buildSlotResetPayload()).eq("id", origen.id);
            if (clearError) throw clearError;

            updateRegistrationDestinations.push({ origenId: origen.id, destinoId: destino.id });
        }

        for (const item of updateRegistrationDestinations) {
            const destinoSlot = getSlotById(item.destinoId) || await fetchSlotById(item.destinoId);

            const { error } = await db
                .from("registrations")
                .update({
                    line_slot_id: item.destinoId,
                    starting_line_id: destinoSlot.starting_line_id
                })
                .eq("line_slot_id", item.origenId);

            if (error) throw error;
        }

        return true;
    }

    function installGlobalEvents() {
        document.addEventListener("click", async (e) => {

            const reserveBtn = e.target.closest("[data-reserve-slot]");
            if (reserveBtn) {
                e.preventDefault();
                e.stopPropagation();

                try {
                    await reservarSlotPor24Horas(reserveBtn.dataset.reserveSlot);
                    await recargarGrillaRealtime();
                } catch (error) {
                    showTransientMessage(error.message || "No se pudo reservar.", "error");
                }

                return;
            }

            const btnMoveFrom = e.target.closest("[data-mobile-move-from]");
            if (btnMoveFrom) {
                if (!APP.esAdmin) return;

                mobileMoveSlotOrigen = btnMoveFrom.dataset.mobileMoveFrom;
                showTransientMessage("Jugador seleccionado. Tocá un lugar libre para moverlo.", "ok");
                renderView();
                return;

                            .from("aag_enrolleds")
                            .select("enrollment_number, first_name, last_name, full_name, gender, current_index, option_club_id, club_name, search_text")
                            .eq("enrollment_number", matricula)
                            .maybeSingle();

                        if (error) throw error;
                        if (!data) throw new Error("No se encontró el jugador AAG seleccionado.");

                        elegido = {
                            id: `aag:${data.enrollment_number}`,
                            origen_busqueda: "aag_enrolleds",
                            enrollment_number: data.enrollment_number,
                            aag_member_number: data.enrollment_number,
                            first_name: data.first_name,
                            last_name: data.last_name,
                            full_name: data.full_name,
                            gender: data.gender,
                            current_index: data.current_index,
                            option_club_id: data.option_club_id,
                            club_name: data.club_name,
                            country: "Argentina",
                            is_club_member: Number(data.option_club_id) === 408
                        };
                    } else {
                        elegido = await fetchPlayerById(playerId);
                    }

                    const jugador = await asegurarJugadorEnPlayers(elegido);

                    const input = document.getElementById("playerSearchInput");
                    const modoPareja = input?.dataset?.modoPareja === "1";
                    const jugadorBaseId = input?.dataset?.jugadorBaseId || "";

                    if (!requiresPartner() || !modoPareja) {
                        await occupySlotWithPlayer(slotId, jugador, "aag_match");
                        await cerrarBuscadorJugador();
                        await loadGrid();
                        return;
                    }

                    if (!jugadorBaseId) {
                        input.dataset.jugadorBaseId = jugador.id;
                        input.value = "";
                        document.getElementById("playerSearchResults").innerHTML = `
        <div style="margin-bottom:8px; font-weight:700; color:#166534;">
          Primer jugador elegido: ${safeText(jugador.full_name)}
        </div>
        <div class="helper-text" style="padding:8px;">
          Ahora buscá al compañero.
        </div>
      `;
                        return;
                    }

                    const jugadorBase = await fetchPlayerById(jugadorBaseId);

                    if (jugadorBase.id === jugador.id) {
                        throw new Error("No podés elegir el mismo jugador dos veces.");
                    }

                    await occupySlotWithPair(slotId, jugadorBase, jugador);
                    await cerrarBuscadorJugador();
                    await loadGrid();

                } catch (error) {
                    console.error(error);
                    showTransientMessage(error.message || "No se pudo seleccionar el jugador.", "error");
                }

                return;
            }

            const manualInlineTrigger = e.target.closest("[data-manual-inline]");
            if (manualInlineTrigger) {
                e.preventDefault();
                e.stopPropagation();
                renderManualInline(manualInlineTrigger.dataset.manualInline);
                return;
            }

            const saveManualTrigger = e.target.closest("[data-save-manual]");
            if (saveManualTrigger) {
                e.preventDefault();
                e.stopPropagation();
                try {
                    await saveManualInline(saveManualTrigger.dataset.saveManual);
                } catch (error) {
                    console.error(error);
                    alert(error.message || "No se pudo guardar el jugador manual.");
                }
                return;
            }

            const occupiedSlot = e.target.closest("[data-slot-id][data-libre='0']");
            if (occupiedSlot) {
                if (!canEditGrid()) return;

                const slotId = occupiedSlot.dataset.slotId;

                try {
                    const slot = await fetchSlotById(slotId);

                    // 👉 si es reserva 24 hs, admin libera con un click
                    if (
                        APP.esAdmin &&
                        String(slot?.notes || "") === "RESERVA_24H_SOCIO" &&
                        lockActive(slot)
                    ) {
                        const ok = confirm("¿Querés volver a habilitar este lugar reservado?");
                        if (!ok) return;

                        await liberarReservaSlot(slotId);
                        await loadGrid();
                        return;
                    }

                    // 👉 si está bloqueado
                    if (slot?.participant_type === "blocked") {
                        await db
                            .from("line_slots")
                            .update(buildSlotResetPayload())
                            .eq("id", slotId);

                        await loadGrid();
                        return;
                    }

                    // 👉 slot ocupado normal
                    const texto = occupiedSlot.dataset.texto || "";
                    const ok = confirm(`¿Querés liberar el lugar ocupado por "${texto}"?`);
                    if (!ok) return;

                    await releaseSlot(slotId);
                    await loadGrid();

                } catch (error) {
                    console.error(error);
                    alert(error.message || "No se pudo liberar el slot.");
                }
            }
        });

        document.addEventListener("keydown", async (e) => {
            const input = e.target.closest(".slot-inline-input");
            if (!input || e.key !== "Enter") return;
            e.preventDefault();
            const slotId = input.id.replace("input-", "");
            const texto = String(input.value || "").trim();
            if (texto.length < 3) return;
            try {
                const jugadores = await searchPlayers(texto);
                renderSearchResults(slotId, jugadores);
            } catch (error) {
                console.error(error);
                alert(error.message || "No se pudo completar la búsqueda.");
            }
        });

        const popupInput = document.getElementById("playerSearchInput");
        const popupResults = document.getElementById("playerSearchResults");

        if (popupInput && popupInput.dataset.popupSearchInstalled !== "1") {
            popupInput.dataset.popupSearchInstalled = "1";

            popupInput.addEventListener("input", () => {
                const texto = String(popupInput.value || "").trim();
                window.clearTimeout(state.searchDebounceTimers.__popup);

                if (!texto) {
                    if (popupResults) popupResults.innerHTML = "";
                    return;
                }

                if (texto.length < 3) {
                    if (popupResults) popupResults.innerHTML = `<div class="helper-text" style="padding:8px;">Escribí al menos 2 caracteres.</div>`;
                    return;
                }

                state.searchDebounceTimers.__popup = window.setTimeout(async () => {
                    try {
                        const jugadores = await searchPlayers(texto);
                        renderPopupSearchResults(jugadores);
                    } catch (error) {
                        console.error(error);
                        if (popupResults) popupResults.innerHTML = `<div class="error" style="padding:8px;">Error al buscar.</div>`;
                    }
                }, CONFIG.SEARCH_DEBOUNCE_MS);
            });
        }

        document.addEventListener("click", async (e) => {
            const popup = document.getElementById("playerSearchPopup");
            if (!popup || popup.classList.contains("hidden")) return;
            if (e.target.closest("#playerSearchPopup")) return;
            if (e.target.closest("[data-open-inline]") || e.target.closest("[data-self-slot]")) return;

            const slotId = slotBusquedaActivo;
            await cerrarBuscadorJugador();
            if (slotId) await unlockLineFromSlot(slotId);
        });

        if (dom.selectorTorneos) {
            dom.selectorTorneos.addEventListener("click", async (e) => {
                const btn = e.target.closest("[data-select-torneo]");
                if (!btn) return;

                const nuevoTorneoId = btn.dataset.selectTorneo;
                if (!nuevoTorneoId || String(nuevoTorneoId) === String(APP.torneoId)) return;

                APP.torneoId = nuevoTorneoId;

                const url = new URL(window.location.href);
                url.searchParams.set("torneo_id", nuevoTorneoId);
                window.history.replaceState({}, "", url.toString());

                await loadGrid();
            });
        }

        if (dom.btnExportarWhatsapp) {
            dom.btnExportarWhatsapp.addEventListener("click", async () => {
                if (!APP.esAdmin) return;
                if (!dom.shareExportWrap) return;

                // 1. generar HTML limpio
                dom.shareExportWrap.innerHTML = renderShareGrid();

                const node = dom.shareExportWrap.firstElementChild;

                // 2. convertir a imagen
                const canvas = await html2canvas(node, {
                    backgroundColor: "#ffffff",
                    scale: 2
                });

                // 3. descargar
                const url = canvas.toDataURL("image/png");

                const link = document.createElement("a");
                link.href = url;
                link.download = "grilla-whatsapp.png";
                link.click();
            });
        }
    }

    function installAdminDragAndDrop() {
        document.addEventListener("dragstart", (e) => {
            const td = e.target.closest("td[data-slot-id][data-libre='0']");
            if (!td || !APP.esAdmin) return;
            state.dragSlotOrigen = {
                slotId: td.dataset.slotId,
                slotNumber: Number(td.dataset.slotNumber || 0),
                texto: td.dataset.texto || "",
            };
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData("text/plain", td.dataset.slotId);
        });

        document.addEventListener("dragover", (e) => {
            const td = e.target.closest("td[data-slot-id][data-libre='1']");
            if (!td || !APP.esAdmin) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
        });

        document.addEventListener("drop", async (e) => {
            const tdDestino = e.target.closest("td[data-slot-id][data-libre='1']");
            if (!tdDestino || !APP.esAdmin || !state.dragSlotOrigen) return;
            e.preventDefault();

            try {
                await moveSlotAdmin(state.dragSlotOrigen.slotId, tdDestino.dataset.slotId);
                state.dragSlotOrigen = null;
                await loadGrid();
            } catch (error) {
                console.error(error);
                alert(error.message || "No se pudo mover el jugador.");
            }
        });
    }

    // ==============================
    // Init
    // ==============================
    installGlobalEvents();
    installAdminDragAndDrop();
    loadGrid();

    document.getElementById("btnHome").addEventListener("click", () => {
        window.location.href = "panel.html";
    });

</script>
</body>

</html>
