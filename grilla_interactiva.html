<!DOCTYPE html>
<html lang="es">

<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js?v=4"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#166534">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grilla interactiva corregida - Villa María Golf</title>
    <style>
        :root {
            --bg: #f4f8f2;
            --card: #ffffff;
            --text: #1d2c1d;
            --muted: #6b7280;
            --line: #e5e7eb;
            --line-strong: #d1d5db;
            --green: #166534;
            --green-soft: #ecfdf5;
            --green-dot: #a0d3b3;
            --orange-soft: #fff0da;
            --orange-dot: #ffb340;
            --amber-soft: #fff4e5;
            --amber-dot: #f5d9a8;
            --red: #b91c1c;
            --gray-soft: #f9fafb;
            --lock-other: #e5e7eb;
            --lock-mine: #ecfdf5;
            --violet-soft: #f3e8ff;
            --violet-dot: #c4a7e7;
            --shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            --radius: 14px;
            --slot-height: 44px;
            --hour-col: 92px;
            /* tocá este valor */
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 24px;
            background: var(--bg);
            color: var(--text);
        }

        #tituloPrincipal {
            text-align: center;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .header-torneo {
            text-align: center;
            margin-bottom: 12px;
        }

        #tituloPrincipal {
            font-size: 48px;
            font-weight: 800;
            margin: 0;
            line-height: 1.1;
        }

        #subTituloTorneo {
            font-size: 14px;
            color: #6b7280;
            margin-top: 4px;
        }

        .sub {
            color: var(--muted);
            margin-bottom: 18px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px 20px;
        }

        .status-item strong {
            display: inline-block;
            min-width: 72px;
        }

        .ok {
            color: var(--green);
            font-weight: 700;
        }

        .error {
            color: var(--red);
            font-weight: 700;
        }

        .bloque-card {
            padding: 14px 14px 12px;
        }

        .bloque-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .bloque-titulo {
            font-weight: 700;
            font-size: 15px;
        }

        .bloque-meta {
            color: var(--muted);
            font-size: 12px;
        }

        .tabla-wrap {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            background: #fff;
        }

        col.col-hora {
            width: var(--hour-col);
        }

        col.col-slot {
            width: calc((100% - var(--hour-col)) / 4);
        }

        th,
        td {
            border: 1px solid var(--line);
            padding: 8px;
            text-align: center;
            vertical-align: middle;
        }

        .col-hora {
            width: var(--hour-col);
            min-width: var(--hour-col);
            max-width: var(--hour-col);
            background: #f3f4f6;
            text-align: center;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        :root {
            --admin-time-col: 84px;
        }

        col.col-admin-time {
            width: var(--admin-time-col);
        }

        .admin-time-cell {
            width: var(--admin-time-col);
            min-width: var(--admin-time-col);
            max-width: var(--admin-time-col);
            text-align: center;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 700;
            background: #f8fafc;
            color: #374151;
        }

        .admin-actions {
            margin: 0 0 16px;
            text-align: center;
        }

        .share-export-wrap {
            position: fixed;
            left: -99999px;
            top: 0;
            width: 1200px;
            z-index: -1;
            pointer-events: none;
        }

        .titulo-hoyo {
            text-align: center;
            font-weight: 700;
            background: #f3f4f6;
            padding: 10px 0;
            border-top: 2px solid var(--line);
            color: #374151;
            letter-spacing: 0.2px;
        }

        .slot-cell {
            padding: 6px;
            transition: background 0.18s ease;
        }

        .slot-box {
            position: relative;
            min-height: var(--slot-height);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 6px 22px 6px 8px;
            text-align: center;
            overflow: hidden;
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .slot-nombre {
            display: block;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.2;
        }

        .slot-empty .slot-box {
            background: #fafafa;
            color: #9ca3af;
            font-style: italic;
            border-color: #f1f5f9;
        }

        .slot-empty:hover .slot-box {
            background: #eef7ef;
        }

        .slot-occupied .slot-box {
            background: #ffffff;
        }

        .slot-self .slot-box {
            background: var(--green-soft);
            border-color: var(--green-dot);
        }

        .slot-guest .slot-box {
            background: var(--orange-soft);
            border-color: var(--orange-dot);
        }

        .slot-admin .slot-box {
            background: var(--amber-soft);
            border-color: #fccb87;
        }

        .slot-vmg .slot-box {
            background: var(--green-soft);
            border-color: var(--green-dot);
        }

        .slot-otro-club .slot-box {
            background: var(--violet-soft);
            border-color: var(--violet-dot);
        }

        .slot-manual .slot-box {
            background: var(--orange-soft);
            border-color: var(--orange-dot);
        }

        .slot-locked-other .slot-box,
        .col-hora.slot-locked-other {
            background: var(--lock-other);
            color: var(--muted);
        }

        .slot-locked-mine .slot-box,
        .col-hora.slot-locked-mine {
            background: var(--lock-mine);
        }

        .slot-indicator {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex: 0 0 10px;
        }

        .slot-indicator-self {
            background: var(--green-dot);
        }

        .slot-indicator-guest {
            background: var(--orange-dot);
        }

        .slot-indicator-admin {
            background: var(--amber-dot);
        }

        .slot-self-btn,
        .slot-inline-manual-btn,
        .manual-form button,
        .slot-inline-close {
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .slot-self-btn {
            background: var(--green);
            color: white;
            padding: 7px 10px;
            font-size: 12px;
        }

        .slot-self-btn:hover {
            background: #166534;
        }

        .slot-libre-link {
            color: var(--muted);
            text-decoration: underline;
            cursor: pointer;
            font-size: 13px;
        }

        .slot-inline-editor {
            margin-top: 10px;
            background: #ffffff;
            border: 1px solid var(--line-strong);
            border-radius: 10px;
            padding: 10px;
            text-align: left;
        }

        .slot-inline-top {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .slot-inline-input {
            flex: 1;
            min-width: 0;
            padding: 8px 10px;
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            font-size: 13px;
        }

        .slot-inline-close {
            background: #e5e7eb;
            color: #111827;
            width: 30px;
            height: 30px;
        }

        .slot-inline-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .slot-inline-manual-btn {
            background: #0841bb;
            color: white;
            padding: 7px 10px;
            font-size: 12px;
        }

        .slot-inline-results,
        .slot-inline-manual-wrap {
            margin-top: 8px;
            font-size: 12px;
        }

        .slot-result-item {
            margin-top: 6px;
        }

        .slot-result-btn {
            width: 100%;
            text-align: left;
            border: 1px solid var(--line-strong);
            background: var(--gray-soft);
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
        }

        .slot-result-btn:hover {
            background: #eef7ef;
        }

        .slot-result-meta {
            display: block;
            margin-top: 4px;
            font-size: 11px;
            color: var(--muted);
        }

        .manual-form {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .manual-form input,
        .manual-form select {
            padding: 7px 8px;
            border-radius: 6px;
            border: 1px solid var(--line-strong);
            font-size: 12px;
        }

        .manual-form button {
            background: var(--green);
            color: white;
            padding: 8px;
        }

        .slot-draggable {
            cursor: grab;
        }

        .slot-draggable:active {
            cursor: grabbing;
        }

        .gap-row {
            height: 12px;
            background: linear-gradient(to bottom, #f3f6f5, #738668, #f3f5f6);
            border: none !important;
            padding: 0 !important;
        }

        .leyenda-slots {
            margin-top: 10px;
            font-size: 13px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .dot-self {
            background: var(--green-dot);
        }

        .dot-guest {
            background: var(--orange-dot);
        }

        .dot-admin {
            background: var(--amber-dot);
        }

        .helper-text {
            color: var(--muted);
            font-size: 12px;
        }

        @media (max-width: 860px) {
            :root {
                --hour-col: 72px;
            }

            body {
                margin: 14px;
            }

            .status-grid {
                grid-template-columns: 1fr;
            }

            .slot-nombre {
                font-size: 13px;
            }

            .bloque-card {
                padding: 12px 10px 10px;
            }

            .mobile-slot.slot-vmg {
                background: #ecfdf5;
                border-color: #a0d3b3;
            }

            .mobile-slot.slot-otro-club {
                background: #f3e8ff;
                border-color: #c4a7e7;
            }

            .mobile-slot.slot-manual {
                background: #ffefef;
                border-color: #96b2df;
            }
        }

        .share-sheet {
            width: 900px;
            background: #e6ffe9;
            color: #031b05;
            padding: 14px;
            font-family: Arial, sans-serif;
        }

        .share-header {
            text-align: center;
            margin-bottom: 12px;
        }

        .share-title {
            font-size: 40px;
            font-weight: 700;
        }

        .share-sub {
            font-size: 18px;
            color: #3d3b3b;
        }

        .share-sheet table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .share-sheet td {
            border: 1px solid #166534;
            padding: 2px 2px;
            height: 12px;
            text-align: center;
            vertical-align: middle;
            font-size: 17px;
        }

        .share-col-ref {
            width: 70px;
            font-weight: 700;
            background: #f3f4f6;
        }

        .share-slot {
            width: calc((100% - 70px) / 4);
        }

        .share-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
            font-size: 6px;
        }

        .share-empty {
            background: #ffffff;
            color: transparent;
        }

        .share-col-time-extra {
            width: 68px;
        }

        .share-time-extra {
            width: 68px;
            min-width: 68px;
            max-width: 68px;
            font-size: 10px;
            font-weight: 700;
            background: #f8fafc;
            color: #374151;
            white-space: nowrap;
        }

        /* 🔹 título por hoyo */
        .share-title-row {
            background: #e5e7eb;
            font-weight: 700;
            text-align: left;
            padding-left: 10px;
            font-size: 12px;
        }

        /* 🔹 separador mañana / tarde */
        .share-block-separator {
            height: 8px;
            background: #d1d5db;
            border: none;
        }

        .share-blocked {
            background: #166534;
            border-color: #166534;
            color: transparent;
        }

        .share-reserved {
            background: #fff4e5;
            border-color: #f59e0b;
            color: #92400e;
            font-weight: 800;
            font-size: 8px;
        }

        .selector-torneos-wrap {
            margin: 0 0 14px;
            text-align: center;
        }

        .selector-torneos-label {
            font-size: 12px;
            font-weight: 700;
            color: #6b7280;
            margin-bottom: 6px;
        }

        .selector-torneos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .selector-torneo-btn {
            border: 1px solid #d1d5db;
            background: #ffffff;
            color: #1f2937;
            padding: 7px 10px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
        }

        .selector-torneo-btn:hover {
            background: #f3f4f6;
        }

        .selector-torneo-btn.activo {
            background: #166534;
            color: #ffffff;
            border-color: #166534;
        }

        .slot-block-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 14px;
            height: 14px;
            border: none;
            border-radius: 999px;
            background: #ffcdcd;
            color: #ff0000;
            font-size: 18px;
            font-weight: 520;
            line-height: 16px;
            text-align: center;
            cursor: pointer;
            padding: 0;
        }

        .slot-block-btn:hover {
            background: #b91c1c;
        }

        .slot-blocked .slot-box {
            background: var(--green-soft);
            border-color: var(--green-dot);
        }

        .slot-blocked .slot-box {
            background: #166534;
            border-color: #166534;
        }

        .player-search-popup {
            position: absolute;
            z-index: 9999;
            width: 300px;
            background: white;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .18);
            padding: 10px;

            display: flex;
            flex-direction: column;

            max-height: 360px;
            overflow: hidden;
        }

        .player-search-popup.hidden {
            display: none;
        }

        #playerSearchInput {
            width: 100%;
            flex: 0 0 auto;
            padding: 9px 10px;
            border: 1px solid #d1d5db;
            border-radius: 9px;
            font-size: 14px;
            box-sizing: border-box;
        }

        #btnManualPopup {
            flex: 0 0 auto;
        }

        #playerSearchResults {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            margin-top: 8px;
        }

        #playerManualPopup {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            margin-top: 8px;
        }

        #playerManualPopup .manual-form {
            min-height: 0;
        }

        .search-result-item {
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        .search-result-item:hover {
            background: #ecfdf5;
        }

        .home-btn {
            position: fixed;
            top: 30px;
            right: 27px;
            width: 38px;
            height: 38px;
            border-radius: 6px;
            background: #166534;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
            z-index: 9999;
            transition: transform 0.15s, background 0.15s;
        }

        .home-btn:hover {
            background: #166534;
            transform: scale(1.05);
        }

        /* ==============================
    MOBILE GRILLA VMGC
    ============================== */
        .mobile-grid {
            display: none;
        }

        @media (max-width: 760px) {
            body {
                margin: 0;
                padding: 12px;
                background: #f4f8f2;
            }

            .home-btn {
                top: 12px;
                right: 12px;
            }

            #tituloPrincipal {
                font-size: 24px;
                padding: 0 44px;
            }

            #subTituloTorneo {
                font-size: 13px;
            }

            .status-grid {
                position: sticky;
                top: 0;
                z-index: 50;
                background: #f4f8f2;
                padding: 8px 0;
                margin-bottom: 8px;
            }

            .desktop-grid {
                display: none !important;
            }

            .mobile-grid {
                display: block;
            }

            .bloque-card {
                padding: 10px;
                margin-bottom: 14px;
            }

            .mobile-line-card {
                background: #ffffff;
                border: 1px solid #dbe3dc;
                border-radius: 16px;
                margin-bottom: 12px;
                overflow: hidden;
                box-shadow: 0 1px 4px rgba(0, 0, 0, .07);
            }

            .mobile-line-head {
                background: #166534;
                color: white;
                padding: 10px 12px;
                display: flex;
                justify-content: space-between;
                gap: 10px;
                align-items: center;
            }

            .mobile-line-title {
                font-weight: 800;
                font-size: 16px;
            }

            .mobile-line-meta {
                font-size: 12px;
                opacity: .9;
                text-align: right;
            }

            .mobile-slots {
                padding: 10px;
                display: grid;
                gap: 8px;
            }

            .mobile-slot {
                border: 1px solid #e5e7eb;
                border-radius: 13px;
                padding: 10px;
                min-height: 54px;
                background: #fafafa;
            }

            .mobile-slot-top {
                display: flex;
                justify-content: space-between;
                gap: 8px;
                align-items: center;
            }

            .mobile-slot-num {
                font-size: 11px;
                color: #6b7280;
                font-weight: 800;
                text-transform: uppercase;
            }

            .mobile-slot-name {
                margin-top: 4px;
                font-size: 16px;
                font-weight: 800;
                color: #111827;
                line-height: 1.2;
            }

            .mobile-slot-empty {
                color: #6b7280;
                font-style: italic;
            }

            .mobile-slot.slot-self {
                background: #ecfdf5;
                border-color: #a0d3b3;
            }

            .mobile-slot.slot-guest {
                background: #eff6ff;
                border-color: #96b2df;
            }

            .mobile-slot.slot-admin {
                background: #fff4e5;
                border-color: #f5d9a8;
            }

            .mobile-slot.slot-blocked,
            .mobile-slot.slot-locked-other {
                background: #e5e7eb;
                color: #6b7280;
            }

            .mobile-actions {
                margin-top: 8px;
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }

            .mobile-actions button {
                border: none;
                border-radius: 10px;
                padding: 9px 12px;
                font-weight: 800;
                cursor: pointer;
            }

            .mobile-btn-main {
                background: #166534;
                color: white;
            }

            .mobile-btn-soft {
                background: #e5e7eb;
                color: #111827;
            }

            .player-search-popup {
                width: calc(100vw - 24px) !important;
                left: 12px !important;
                right: 12px !important;
                max-height: 75vh !important;
                border-radius: 16px;
            }

            #playerSearchInput {
                font-size: 16px;
                padding: 12px;
            }

            .slot-result-btn {
                padding: 12px;
                font-size: 14px;
            }

            .manual-form input,
            .manual-form select {
                font-size: 16px;
                padding: 11px;
            }

            .manual-form button {
                padding: 12px;
                font-size: 15px;
            }
        }

        .floating-back-btn {
            position: fixed;

            bottom: calc(env(safe-area-inset-bottom) + 14px);
            left: 14px;

            width: 42px;
            height: 42px;

            border-radius: 12px;
            z-index: 9999;

            display: flex;
            align-items: center;
            justify-content: center;

            background: rgba(197, 212, 198, 0.92);
            color: #166534;

            font-size: 22px;
            font-weight: 700;
            line-height: 1;

            padding-bottom: 2px;

            border: none;
            outline: none;

            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<body>

    <div style="padding: 10px 10px 0;">
        <button class="floating-back-btn" onclick="window.location.href='panel.html'">
            &lt;
        </button>
    </div>

    <div class="header-torneo">
        <h1 id="tituloPrincipal">Grilla Interactiva</h1>
        <div id="subTituloTorneo" class="sub"></div>
    </div>

    <div id="selectorTorneosWrap" class="selector-torneos-wrap" style="display:none;">
        <div class="selector-torneos-label">Torneos abiertos</div>
        <div id="selectorTorneos" class="selector-torneos"></div>
    </div>

    <div class="status-grid">
        <div class="status-item" style="display:none;">
            <strong>Torneo:</strong> <span id="torneoNombre">Cargando...</span>
        </div>
        <div class="status-item">
            <strong>Estado:</strong> <span id="estado">Conectando...</span>
        </div>
    </div>

    <div id="adminActions" class="admin-actions" style="display:none;">
        <button id="btnExportarWhatsapp" class="slot-self-btn" type="button">
            Exportar imagen WhatsApp
        </button>
    </div>

    <div id="contenido"></div>

    <div class="leyenda-slots">
        <span><span class="dot dot-self"></span> Propio</span>
        <span><span class="dot dot-guest"></span> Invitado</span>
        <span><span class="dot dot-admin"></span> Administración</span>
    </div>

    <div id="shareExportWrap" class="share-export-wrap" aria-hidden="true"></div>

    <div id="playerSearchPopup" class="player-search-popup hidden">
        <input id="playerSearchInput" type="text" placeholder="Buscar jugador...">

        <button id="btnManualPopup" type="button" class="slot-inline-manual-btn" style="width:100%; margin-top:8px;">
            Carga manual
        </button>

        <div id="playerSearchResults"></div>
        <div id="playerManualPopup" style="display:none; margin-top:8px;"></div>
    </div>

</body>

<script type="module">

    // ==============================
    // Configuración
    // ==============================
    const CONFIG = {
        LOCK_MINUTES: 2,
        MAX_GROUP_SIZE: 8,
        SEARCH_DEBOUNCE_MS: 180,
        SLOT_COUNT: 4,
    };

    const { data: { session } } = await db.auth.getSession();

    if (!session) {
        window.location.href = "login.html";
        throw new Error("No logueado");
    }

    const { data: profile, error: profileError } = await db
        .from("profiles")
        .select("role, active")
        .eq("id", session.user.id)
        .maybeSingle();

    if (profileError) {
        console.error("Error leyendo perfil:", profileError);
        alert("No se pudo verificar el usuario.");
        window.location.href = "login.html";
        throw profileError;
    }

    if (!profile || profile.active !== true) {
        alert("Usuario sin perfil activo.");
        window.location.href = "login.html";
        throw new Error("Perfil inválido");
    }

    const esAdmin = profile.role === "admin";

    const params = new URLSearchParams(window.location.search);

    const { data: miJugador, error: playerError } = await db
        .from("players")
        .select("id")
        .eq("profile_id", session.user.id)
        .maybeSingle();

    if (!esAdmin && (playerError || !miJugador)) {
        alert("Tu usuario no está vinculado a un jugador.");
        window.location.href = "panel.html";
        throw new Error("Usuario sin player vinculado");
    }

    const APP = {
        torneoId: params.get("torneo_id"),
        esAdmin,
        miPlayerId: esAdmin ? null : miJugador.id,
        sessionLockId: sessionStorage.getItem("vmg_lock_session") || crypto.randomUUID(),
    };

    sessionStorage.setItem("vmg_lock_session", APP.sessionLockId);

    // ==============================
    // DOM
    // ==============================
    const dom = {
        torneoNombre: document.getElementById("torneoNombre"),
        estado: document.getElementById("estado"),
        contenido: document.getElementById("contenido"),
        adminActions: document.getElementById("adminActions"),
        btnExportarWhatsapp: document.getElementById("btnExportarWhatsapp"),
        shareExportWrap: document.getElementById("shareExportWrap"),
        selectorTorneosWrap: document.getElementById("selectorTorneosWrap"),
        selectorTorneos: document.getElementById("selectorTorneos"),
    };

    // ==============================
    // Estado global
    // ==============================
    const state = {
        torneo: null,
        blocks: [],
        lines: [],
        slots: [],
        slotsById: new Map(),
        linesById: new Map(),
        slotsByLineId: new Map(),
        blockByLineId: new Map(),
        playerAlreadyRegistered: false,
        dragSlotOrigen: null,
        searchDebounceTimers: {},
    };

    const searchCache = new Map();

    let slotBusquedaActivo = null;
    let activeLockedLineId = null;

    let mobileMoveSlotOrigen = null;

    let realtimeChannel = null;
    let realtimeReloadTimer = null;

    function abrirBuscadorJugador(slotId, elemento, opciones = {}) {
        slotBusquedaActivo = slotId;

        const popup = document.getElementById("playerSearchPopup");
        const input = document.getElementById("playerSearchInput");
        const results = document.getElementById("playerSearchResults");
        const manual = document.getElementById("playerManualPopup");

        if (!popup || !input || !results) {
            console.error("Falta el HTML del popup de búsqueda");
            return;
        }

        input.value = "";
        input.dataset.modoPareja = opciones.modoPareja || (requiresPartner() ? "1" : "0");
        input.dataset.jugadorBaseId = opciones.jugadorBaseId || "";
        results.innerHTML = opciones.mensaje || "";

        if (manual) {
            manual.style.display = "none";
            manual.innerHTML = "";
        }

        const rect = elemento.getBoundingClientRect();
        const anchoPopup = 300;
        const margen = 10;

        const left = Math.min(
            rect.left + window.scrollX,
            window.scrollX + window.innerWidth - anchoPopup - margen
        );

        popup.classList.remove("hidden");
        popup.style.visibility = "hidden";
        popup.style.maxHeight = "360px";
        popup.style.overflow = "hidden";

        requestAnimationFrame(() => {
            if (window.innerWidth <= 760) {
                const visualHeight = window.visualViewport?.height || window.innerHeight;
                const visualTop = window.visualViewport?.offsetTop || 0;

                popup.style.position = "fixed";
                popup.style.left = "12px";
                popup.style.right = "12px";
                popup.style.width = "auto";
                popup.style.top = `${visualTop + 12}px`;
                popup.style.bottom = "auto";
                popup.style.transform = "";
                popup.style.maxHeight = `${Math.max(260, visualHeight - 24)}px`;
            } else {
                const espacioAbajo = window.innerHeight - rect.bottom;
                const espacioArriba = rect.top;

                const altoEstimadoPopup = Math.min(popup.offsetHeight || 360, 360);
                const abrirArriba = espacioAbajo < altoEstimadoPopup + 16 && espacioArriba > espacioAbajo;

                popup.style.left = `${Math.max(margen, left)}px`;
                popup.style.maxHeight = `${Math.max(220, Math.min(360, abrirArriba ? espacioArriba - 12 : espacioAbajo - 12))}px`;

                if (abrirArriba) {
                    popup.style.top = "auto";
                    popup.style.bottom = `${window.innerHeight - rect.top + 6}px`;
                    popup.style.position = "fixed";
                } else {
                    popup.style.bottom = "auto";
                    popup.style.top = `${rect.bottom + 6}px`;
                    popup.style.position = "fixed";
                }

                popup.style.transform = "";
            }

            popup.style.visibility = "visible";
            input.focus();

            setTimeout(reposicionarBuscadorJugador, 250);
        });
    }

    function reposicionarBuscadorJugador() {
        const popup = document.getElementById("playerSearchPopup");
        const input = document.getElementById("playerSearchInput");

        if (!popup || !input || popup.classList.contains("hidden")) return;

        if (window.innerWidth <= 760) {
            const visualHeight = window.visualViewport?.height || window.innerHeight;
            const visualTop = window.visualViewport?.offsetTop || 0;

            popup.style.position = "fixed";
            popup.style.left = "12px";
            popup.style.right = "12px";
            popup.style.width = "auto";
            popup.style.top = `${visualTop + 12}px`;
            popup.style.bottom = "auto";
            popup.style.transform = "";
            popup.style.maxHeight = `${Math.max(260, visualHeight - 24)}px`;

            return;
        }

        const slotId = slotBusquedaActivo;
        if (!slotId) return;

        const trigger = document.querySelector(`[data-open-inline="${slotId}"], [data-self-slot="${slotId}"]`);
        if (!trigger) return;

        const rect = trigger.getBoundingClientRect();
        const margen = 10;

        const espacioAbajo = window.innerHeight - rect.bottom;
        const espacioArriba = rect.top;

        const altoActual = Math.min(popup.scrollHeight || 360, 360);
        const abrirArriba = espacioAbajo < altoActual + 16 && espacioArriba > espacioAbajo;

        popup.style.position = "fixed";
        popup.style.maxHeight = `${Math.max(220, Math.min(360, abrirArriba ? espacioArriba - 12 : espacioAbajo - 12))}px`;

        if (abrirArriba) {
            popup.style.top = "auto";
            popup.style.bottom = `${window.innerHeight - rect.top + 6}px`;
        } else {
            popup.style.bottom = "auto";
            popup.style.top = `${rect.bottom + 6}px`;
        }
    }

    if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", reposicionarBuscadorJugador);
        window.visualViewport.addEventListener("scroll", reposicionarBuscadorJugador);
    }

    function abrirCargaManualPopup() {
        const wrap = document.getElementById("playerManualPopup");
        if (!wrap || !slotBusquedaActivo) return;

        wrap.innerHTML = "";
        wrap.style.display = "block";

        const popup = document.getElementById("playerSearchPopup");
        if (popup) {
            popup.style.maxHeight = "360px";
            popup.style.overflow = "hidden";
        }

        wrap.innerHTML = `
      <div class="manual-form">
        <input id="popup-nombre" placeholder="Nombre *" />
        <input id="popup-apellido" placeholder="Apellido *" />
        <input id="popup-index" placeholder="Índice" />
        <select id="popup-genero">
          <option value="">Género *</option>
          <option value="male">Caballero</option>
          <option value="female">Dama</option>
        </select>
        <input id="popup-pais" placeholder="País" />
        <button id="btnGuardarManualPopup" type="button">Guardar jugador</button>
      </div>
    `;

        reposicionarBuscadorJugador();
    }

    async function cerrarBuscadorJugador() {
        const popup = document.getElementById("playerSearchPopup");
        const input = document.getElementById("playerSearchInput");
        const results = document.getElementById("playerSearchResults");

        if (popup) popup.classList.add("hidden");
        if (input) {
            input.value = "";
            input.dataset.modoPareja = "0";
            input.dataset.jugadorBaseId = "";
        }
        if (results) results.innerHTML = "";

        if (popup) {
            popup.style.top = "";
            popup.style.bottom = "";
            popup.style.position = "";
        }

        if (slotBusquedaActivo) {
            try { await unlockLineFromSlot(slotBusquedaActivo); } catch (error) { console.error("No se pudo liberar la línea activa:", error); }
        }

        slotBusquedaActivo = null;
    }

    function renderPopupSearchResults(jugadores) {
        const cont = document.getElementById("playerSearchResults");
        if (!cont || !slotBusquedaActivo) return;

        if (!jugadores?.length) {
            cont.innerHTML = `<div class="helper-text" style="padding:8px;">No se encontraron coincidencias.</div>`;
            return;
        }

        cont.innerHTML = jugadores.map((j) => `
      <div class="slot-result-item">
        <button class="slot-result-btn" data-pick-player="${slotBusquedaActivo}" data-player-id="${j.id}">
          <strong>${safeText(j.full_name || `${j.first_name || ""} ${j.last_name || ""}`.trim())}</strong>
          <span class="slot-result-meta">
            ${j.aag_member_number ? `Matrícula: ${safeText(j.aag_member_number)}` : "Sin matrícula"}
            ${j.current_index != null ? ` · Index: ${safeText(j.current_index)}` : ""}
            ${j.club_name ? ` · ${safeText(j.club_name)}` : ""}
          </span>
        </button>
      </div>
    `).join("");

        reposicionarBuscadorJugador();
    }

    // ==============================
    // Helpers generales
    // ==============================
    function normalizarBusqueda(texto) {
        return String(texto || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/,/g, " ")
            .replace(/\s+/g, " ")
            .trim()
            .toUpperCase();
    }

    function coincideBusqueda(nombre, busqueda) {
        const nombreNorm = normalizarBusqueda(nombre);
        const partes = normalizarBusqueda(busqueda).split(" ").filter(Boolean);

        return partes.every(p => nombreNorm.includes(p));
    }

    function setStatus(texto, tipo = "") {
        dom.estado.textContent = texto;
        dom.estado.className = tipo;
    }

    function showTransientMessage(texto, tipo = "error") {
        setStatus(texto, tipo);
        window.clearTimeout(showTransientMessage._timer);
        showTransientMessage._timer = window.setTimeout(() => {
            if (!state.torneo) return;
            setStatus(statusLabelFromTournament(state.torneo.status), state.torneo.status === "open" ? "ok" : "error");
        }, 3000);
    }

    function formatNombreCorto(fullName) {
        if (!fullName) return "";

        const partes = String(fullName).split(",");

        if (partes.length < 2) return fullName;

        const apellido = partes[0].trim();
        const nombres = partes[1].trim().split(/\s+/);

        const iniciales = nombres
            .filter(Boolean)
            .map(n => n.charAt(0).toUpperCase() + ".")
            .join(" ");

        return `${apellido}, ${iniciales}`;
    }

    function safeText(valor) {
        return String(valor ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function timeText(valor) {
        return valor ? String(valor).slice(0, 5) : "";
    }

    function isSimultaneousTournament() {
        return String(state.torneo?.start_type || "").toLowerCase() === "simultanea";
    }

    function normalizeBisText(value) {
        return String(value || "")
            .toLowerCase()
            .normalize("NFD")
            .replace(/\p{Diacritic}/gu, "");
    }

    function isBisLine(line) {
        const label = normalizeBisText(line?.label || "");
        return label.includes("bis");
    }

    function getSimultaneousLineOrderValue(line) {
        const hole = Number(line?.starting_hole || 0);
        const bisOffset = isBisLine(line) ? 0.5 : 0;
        return hole + bisOffset;
    }

    function formatSimultaneousHoleLabel(line) {
        const hole = Number(line?.starting_hole || 0);
        if (!hole) return "";
        return isBisLine(line) ? `${hole} BIS` : `${hole}`;
    }

    function timeTextToMinutes(value) {
        const raw = String(value || "").slice(0, 5);
        const [hh, mm] = raw.split(":").map(Number);

        if (Number.isNaN(hh) || Number.isNaN(mm)) return null;
        return hh * 60 + mm;
    }

    function formatFechaLargaCapitalizada(fechaStr) {
        if (!fechaStr) return "";

        const [year, month, day] = String(fechaStr).split("-").map(Number);
        if (!year || !month || !day) return "";

        const fecha = new Date(year, month - 1, day);

        const weekday = fecha.toLocaleDateString("es-AR", { weekday: "long" });
        const monthName = fecha.toLocaleDateString("es-AR", { month: "long" });

        const capitalizar = (txt) => txt.charAt(0).toUpperCase() + txt.slice(1);

        return `${capitalizar(weekday)} ${day} de ${capitalizar(monthName)} de ${year}`;
    }

    function getTournamentStatus() {
        return String(state.torneo?.status || "").toLowerCase();
    }

    function canAdminEditClosedTournament() {
        return APP.esAdmin && getTournamentStatus() === "closed";
    }

    function canEditGrid() {
        const status = getTournamentStatus();

        if (APP.esAdmin) {
            return status === "open" || status === "closed" || status === "officialized";
        }

        return status === "open";
    }

    function isReadOnlyTournament() {
        return getTournamentStatus() === "archived";
    }

    function capitalizarTexto(texto) {
        return texto.replace(/\b\w/g, l => l.toUpperCase());
    }

    function sortLinesForDisplay(lines) {
        const items = Array.isArray(lines) ? [...lines] : [];

        if (isSimultaneousTournament()) {
            return items.sort((a, b) => {
                const orderA = getSimultaneousLineOrderValue(a);
                const orderB = getSimultaneousLineOrderValue(b);

                if (orderA !== orderB) return orderA - orderB;

                const labelA = String(a?.label || "");
                const labelB = String(b?.label || "");
                return labelA.localeCompare(labelB);
            });
        }

        return items.sort((a, b) => {
            const holeA = Number(a?.starting_hole || 0);
            const holeB = Number(b?.starting_hole || 0);

            if (holeA !== holeB) return holeA - holeB;

            const timeA = String(a?.line_time || "");
            const timeB = String(b?.line_time || "");
            return timeA.localeCompare(timeB);
        });
    }

    function addMinutesToHourText(hourText, minutesToAdd) {
        if (!hourText) return "";

        const raw = String(hourText).slice(0, 5);
        const [hh, mm] = raw.split(":").map(Number);

        if (Number.isNaN(hh) || Number.isNaN(mm)) return "";

        const total = (hh * 60 + mm + minutesToAdd) % (24 * 60);
        const finalHours = Math.floor(total / 60);
        const finalMinutes = total % 60;

        return `${String(finalHours).padStart(2, "0")}:${String(finalMinutes).padStart(2, "0")}`;
    }

    function getPaso9Hoyos(lineTime) {
        return addMinutesToHourText(lineTime, 150);
    }

    function getFinJuego(lineTime) {
        return addMinutesToHourText(lineTime, 300);
    }

    function parseIndex(valor) {
        const txt = String(valor || "").trim();
        if (!txt) return null;
        const n = Number(txt.replace(",", "."));
        return Number.isNaN(n) ? null : n;
    }

    function nowIso() {
        return new Date().toISOString();
    }

    function addMinutesIso(minutes) {
        return new Date(Date.now() + minutes * 60 * 1000).toISOString();
    }

    function normalizeSlotName(slot) {
        if (!slot) return "Libre";
        const nombre = String(slot.display_name || "").trim();
        if (!nombre || nombre.toUpperCase() === "LIBRE") return "Libre";
        return nombre;
    }

    function isSlotEmpty(slot) {
        const participantType = String(slot?.participant_type || "").toLowerCase();
        if (participantType === "blocked") return false;
        return normalizeSlotName(slot) === "Libre";
    }

    function isTournamentOpen() {
        return canEditGrid();
    }

    function requiresPartner() {
        return state.torneo?.game_modes?.requires_partner === true;
    }

    function statusLabelFromTournament(status) {
        const s = String(status || "").toLowerCase();
        if (s === "open") return "Inscripción abierta";
        if (s === "closed") return "Torneo cerrado para cambios";
        if (s === "officialized") return "Torneo ya guardado · administración habilitada";
        if (s === "archived") return "Torneo archivado / solo lectura";

        return `Estado: ${s || "desconocido"}`;
    }

    function getPartnerBlock(slotNumber) {
        const n = Number(slotNumber);
        if (n === 1 || n === 2) return { inicio: 1, fin: 2 };
        if (n === 3 || n === 4) return { inicio: 3, fin: 4 };
        return null;
    }

    function getSlotById(slotId) {
        return state.slotsById.get(slotId) || null;
    }

    function getLineById(lineId) {
        return state.linesById.get(lineId) || null;
    }

    function getLineSlots(lineId) {
        return (state.slotsByLineId.get(lineId) || []).slice().sort((a, b) => a.slot_number - b.slot_number);
    }

    function getSlotCssType(slot) {
        const type = String(slot?.participant_type || "").toLowerCase();

        if (type === "blocked") return "slot-blocked";

        // Jugador cargado manualmente: no tiene matrícula AAG
        if (!slot?.aag_member_number) {
            return "slot-manual";
        }

        const club = normalizarBusqueda(slot?.club_name || "");

        // Socio Villa María Golf Club
        if (
            club.includes("VILLA MARIA GOLF") ||
            club.includes("VILLA MARIA GOLF CLUB") ||
            club === "408"
        ) {
            return "slot-vmg";
        }

        // Tiene matrícula pero es de otro club
        return "slot-otro-club";
    }

    function lockActive(slot) {
        return !!slot?.lock_expires_at && new Date(slot.lock_expires_at).getTime() > Date.now();
    }

    function lockIsMine(slot) {
        if (!slot || !lockActive(slot)) return false;

        if (APP.miPlayerId && String(slot.locked_by_player_id || "") === String(APP.miPlayerId)) {
            return true;
        }

        return slot.locked_by_session === APP.sessionLockId;
    }

    function lockIsOther(slot) {
        if (!slot?.locked_by_player_id && !slot?.locked_by_session) return false;
        if (!lockActive(slot)) return false;

        // Reserva 24 hs del socio: también la tiene que ver el admin como reservado.
        if (String(slot.notes || "") === "RESERVA_24H_SOCIO") {
            if (APP.miPlayerId && String(slot.locked_by_player_id || "") === String(APP.miPlayerId)) return false;
            return true;
        }

        if (APP.miPlayerId && String(slot.locked_by_player_id || "") === String(APP.miPlayerId)) {
            return false;
        }

        if (slot.locked_by_session === APP.sessionLockId) {
            return false;
        }

        return true;
    }

    function buildSlotResetPayload() {
        return {
            display_name: "",
            participant_type: "self",
            created_by_player_id: null,
            linked_player_id: null,
            aag_member_number: null,
            club_name: null,
            country: null,
            manual_index: null,
            needs_admin_review: false,
            notes: null,
            locked_by_session: null,
            locked_by_player_id: null,
            lock_expires_at: null,
        };
    }

    function buildSlotPayloadFromPlayer(jugador, participantType) {
        return {
            display_name: jugador.full_name,
            participant_type: participantType,
            created_by_player_id: APP.miPlayerId || null,
            linked_player_id: jugador.id,
            aag_member_number: jugador.aag_member_number || null,
            club_name: jugador.club_name || null,
            country: jugador.country || null,
            manual_index: jugador.current_index ?? null,
            needs_admin_review: !jugador.aag_member_number,
            locked_by_session: null,
            locked_by_player_id: null,
            lock_expires_at: null,
        };
    }

    function participantTypeForGrid(jugador) {
        if (APP.esAdmin) return "admin";
        if (jugador.id === APP.miPlayerId) return "self";
        return "guest";
    }

    function registrationTypeForPlayer(jugador, fallback = "aag_match") {
        if (jugador.id === APP.miPlayerId) return "self";
        return jugador.aag_member_number ? fallback : "manual_guest";
    }

    function getOccupiedCountCreatedByMe() {
        if (APP.esAdmin || !APP.miPlayerId) return 0;
        return state.slots.filter((slot) => slot.created_by_player_id === APP.miPlayerId && !isSlotEmpty(slot)).length;
    }

    // ==============================
    // Consultas y carga principal
    // ==============================
    async function blockSlotByAdmin(slotId) {
        if (!APP.esAdmin) throw new Error("Solo admin puede bloquear.");
        if (!canEditGrid()) throw new Error("El torneo no permite modificaciones.");

        const { error } = await db
            .from("line_slots")
            .update({
                participant_type: "blocked",
                display_name: "",
                created_by_player_id: null,
                linked_player_id: null,
                notes: "BLOCKED_BY_ADMIN"
            })
            .eq("id", slotId);

        if (error) throw error;
    }

    async function fetchTournament() {
        let query = db
            .from("tournaments")
            .select(`
      id,
      name,
      tournament_date,
      status,
      published,
      start_type,
      game_modes (
        id,
        name,
        participation_type,
        requires_partner
      )
    `)
            .eq("id", APP.torneoId);

        if (!APP.esAdmin) {
            query = query
                .eq("status", "open")
                .eq("published", true);
        }

        const { data, error } = await query.single();

        if (error) throw error;
        if (!data) throw new Error("No se encontró el torneo o no tenés permiso para verlo.");
        return data;
    }

    async function fetchOldestOpenTournaments(limit = 5) {
        let query = db
            .from("tournaments")
            .select("id, name, tournament_date, status, published")
            .eq("status", "open");

        if (!APP.esAdmin) {
            query = query.eq("published", true);
        }

    function rebuildIndexes() {
        state.slotsById = new Map(state.slots.map((slot) => [slot.id, slot]));
        state.linesById = new Map(state.lines.map((line) => [line.id, line]));
        state.slotsByLineId = new Map();
        state.blockByLineId = new Map();

        for (const line of state.lines) {
            state.slotsByLineId.set(line.id, []);
        }

        for (const slot of state.slots) {
            if (!state.slotsByLineId.has(slot.starting_line_id)) state.slotsByLineId.set(slot.starting_line_id, []);
            state.slotsByLineId.get(slot.starting_line_id).push(slot);
        }

        for (const block of state.blocks) {
            for (const line of state.lines.filter((item) => item.starting_block_id === block.id)) {
                state.blockByLineId.set(line.id, block);
            }
        }
    }

    async function recargarGrillaRealtime() {
        if (!state.torneo?.id || !state.lines?.length) return;

        try {
            const lineIds = state.lines.map(l => l.id);

            state.slots = await fetchSlots(lineIds);
            state.playerAlreadyRegistered = await fetchPlayerAlreadyRegistered(state.torneo.id);

            rebuildIndexes();
            renderView();

        } catch (error) {
            console.error("Error realtime grilla:", error);
        }
    }

    function programarRecargaRealtime() {
        clearTimeout(realtimeReloadTimer);

        realtimeReloadTimer = setTimeout(() => {
            recargarGrillaRealtime();
        }, 350);
    }

    function suscribirRealtimeGrilla() {
        if (!state.torneo?.id) return;

        if (realtimeChannel) {
            db.removeChannel(realtimeChannel);
            realtimeChannel = null;
        }

        realtimeChannel = db
            .channel(`grilla-${state.torneo.id}`)
            .on(
                "postgres_changes",
                {
                    event: "*",
                    schema: "public",
                    table: "line_slots"
                },
                () => {
                    programarRecargaRealtime();
                }
            )
            .on(
                "postgres_changes",
                {
                    event: "*",
                    schema: "public",
                    table: "registrations"
                },
                () => {
                    programarRecargaRealtime();
                }
            )
            .subscribe((status) => {
                console.log("Realtime grilla:", status);
            });
    }

    async function loadGrid() {
        try {
            setStatus("Buscando torneo...");
            dom.torneoNombre.textContent = "Cargando...";

            const torneosAbiertos = await fetchOldestOpenTournaments(5);

            if (!APP.torneoId) {
                const torneoPorDefecto = torneosAbiertos[0] || await fetchOldestOpenTournament();
                if (!torneoPorDefecto?.id) {
                    throw new Error("Esperando el próximo Torneo.");
                }
                APP.torneoId = torneoPorDefecto.id;
            }

            renderTournamentSelector(torneosAbiertos);

            state.torneo = await fetchTournament();

            document.getElementById("tituloPrincipal").textContent = state.torneo.name || "Torneo";

            document.getElementById("tituloPrincipal").textContent =
                state.torneo?.name || "Torneo";

            const sub = document.getElementById("subTituloTorneo");
            if (sub) {
                sub.textContent = formatFechaLargaCapitalizada(state.torneo?.tournament_date);
            }

            state.blocks = await fetchBlocks(state.torneo.id);
            state.lines = await fetchLines(state.blocks.map((b) => b.id));
            state.slots = await fetchSlots(state.lines.map((l) => l.id));
            state.playerAlreadyRegistered = await fetchPlayerAlreadyRegistered(state.torneo.id);

            state.showAdminSequentialTimes =
                APP.esAdmin &&
                String(state.torneo?.start_type || "").toLowerCase() === "secuencial";

            const status = getTournamentStatus();

            if (status === "open") {
                setStatus("Inscripción abierta", "ok");
            } else if (status === "closed") {
                setStatus(
                    APP.esAdmin
                        ? "Torneo cerrado · administración habilitada"
                        : "Torneo cerrado para cambios",
                    "error"
                );
            } else if (status === "archived") {
                setStatus("Torneo archivado / solo lectura", "error");
            } else {
                setStatus(`Estado: ${status || "desconocido"}`, "error");
            }

            if (dom.adminActions) {
                dom.adminActions.style.display = APP.esAdmin ? "block" : "none";
            }

            rebuildIndexes();
            renderView();
            suscribirRealtimeGrilla();
        } catch (err) {
            console.error(err);
            setStatus("Error", "error");
            dom.contenido.innerHTML = `<div class="card error">${safeText(err.message || "No se pudo cargar la grilla.")}</div>`;
        }
    }

    async function searchPlayers(term) {
        const texto = String(term || "").trim();
        if (!texto || texto.length < 2) return [];

        const cacheKey = normalizarBusqueda(texto);
        if (searchCache.has(cacheKey)) return searchCache.get(cacheKey);

        const q = normalizarBusqueda(texto).replace(/\s+/g, "%");

        const { data: playersData, error: playersError } = await db
            .from("players")
            .select("id, first_name, last_name, full_name, aag_member_number, current_index, gender, club_name, country, is_club_member, search_text")
            .ilike("search_text", `%${q}%`)
            .limit(15);

        if (playersError) throw playersError;

        const { data: aagData, error: aagError } = await db
            .from("aag_enrolleds")
            .select("enrollment_number, first_name, last_name, full_name, gender, current_index, option_club_id, club_name, search_text")
            .ilike("search_text", `%${q}%`)
            .limit(15);

        if (aagError) throw aagError;

        console.log("AAG DATA:", aagData, aagError);

        const players = (playersData || []).map(p => ({
            ...p,
            origen_busqueda: "players"
        }));

        const yaEstanEnPlayers = new Set(
            players.map(p => String(p.aag_member_number || ""))
        );

        const externos = (aagData || [])
            .filter(p => !yaEstanEnPlayers.has(String(p.enrollment_number || "")))
            .map(p => ({
                id: `aag:${p.enrollment_number}`,
                origen_busqueda: "aag_enrolleds",
                enrollment_number: p.enrollment_number,
                aag_member_number: p.enrollment_number,
                first_name: p.first_name,
                last_name: p.last_name,
                full_name: p.full_name,
                gender: p.gender,
                current_index: p.current_index,
                option_club_id: p.option_club_id,
                club_name: p.club_name,
                country: "Argentina",
                is_club_member: Number(p.option_club_id) === 408
            }));

        function scoreJugador(p) {
            const buscado = normalizarBusqueda(texto);
            const partes = buscado.split(" ").filter(Boolean);

            const nombre = normalizarBusqueda(
                `${p.full_name || ""} ${p.last_name || ""} ${p.first_name || ""} ${p.aag_member_number || p.enrollment_number || ""}`
            );

            let score = 0;

            // Prioridad Villa María
            if (Number(p.option_club_id) === 408 || p.is_club_member === true) score += 10000;

            // Coincidencia exacta de matrícula
            if (String(p.aag_member_number || p.enrollment_number || "") === texto) score += 8000;

            // Coincidencia fuerte de nombre completo
            if (nombre.includes(buscado)) score += 4000;

            // Todas las palabras encontradas
            if (partes.every(parte => nombre.includes(parte))) score += 2500;

            // Suma parcial
            score += partes.filter(parte => nombre.includes(parte)).length * 500;

            return score;
        }

        const resultado = [...players, ...externos]
            .map(p => ({ ...p, _score: scoreJugador(p) }))
            .sort((a, b) => b._score - a._score)
            .slice(0, 4);

        searchCache.set(cacheKey, resultado);
        return resultado;
    }

    async function asegurarJugadorEnPlayers(jugador) {
        if (jugador.origen_busqueda === "players" && jugador.id && !String(jugador.id).startsWith("aag:")) {
            return jugador;
        }

        const matricula = jugador.enrollment_number || jugador.aag_member_number;

        const row = {
            aag_member_number: matricula,
            first_name: jugador.first_name || "",
            last_name: jugador.last_name || "",
            gender: jugador.gender || "male",
            current_index: jugador.current_index ?? null,
            option_club_id: jugador.option_club_id ?? null,
            club_name: jugador.club_name || "",
            country: jugador.country || "Argentina",
            source: "AAG",
            is_club_member: Number(jugador.option_club_id) === 408,
            aag_last_sync_at: new Date().toISOString(),
            search_text: [
                jugador.last_name,
                jugador.first_name,
                jugador.first_name,
                jugador.last_name,
                matricula
            ]
                .filter(Boolean)
                .join(" ")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toUpperCase()
        };

        const { data, error } = await db
            .from("players")
            .upsert(row, { onConflict: "aag_member_number" })
            .select("*")
            .single();

        if (error) throw error;

        searchCache.clear();
        return data;
    }

    async function validatePlayerNotDuplicated(playerId) {
        if (!playerId) return true;

        const { data: regData, error: regError } = await db
            .from("registrations")

            .eq("tournament_id", state.torneo.id)
            .eq("linked_player_id", playerId)

        if (regData?.length) {
            throw new Error(`${regData[0].display_name || "Ese jugador"} ya está anotado en este torneo.`);
        }

        const lineIds = state.lines.map(l => l.id);

        if (lineIds.length) {
            const { data: slotData, error: slotError } = await db
                .from("line_slots")
                .select("id, display_name")
                .in("starting_line_id", lineIds)
                .eq("linked_player_id", playerId)

            if (slotError) throw slotError;

            if (slotData?.length) {
                throw new Error(`${slotData[0].display_name || "Ese jugador"} ya está anotado en la grilla.`);
            }
        }

        return true;
    }

    function isMyTemporaryLock(slot) {
        if (!slot || !lockActive(slot)) return false;
        if (String(slot.notes || "") === "RESERVA_24H_SOCIO") return false;

        if (slot.locked_by_session === APP.sessionLockId) return true;

        if (APP.miPlayerId && String(slot.locked_by_player_id || "") === String(APP.miPlayerId)) {
            return true;
        }

        return false;
    }

    async function unlockMyTemporaryLocks(exceptLineId = null) {
        const filtros = [];

        filtros.push(`locked_by_session.eq.${APP.sessionLockId}`);

        if (APP.miPlayerId) {
            filtros.push(`locked_by_player_id.eq.${APP.miPlayerId}`);
        }

        let query = db
            .from("line_slots")
            .update({
                locked_by_session: null,
                locked_by_player_id: null,
                lock_expires_at: null,
            })
            .or(filtros.join(","))
            .neq("notes", "RESERVA_24H_SOCIO");

        if (exceptLineId) {
            query = query.neq("starting_line_id", exceptLineId);
        }

        const { error } = await query;
        if (error) throw error;

        if (!exceptLineId || String(activeLockedLineId || "") !== String(exceptLineId)) {
            activeLockedLineId = exceptLineId || null;
        }
    }

    async function lockLineFromSlot(slotId) {
        const slotActual = getSlotById(slotId) || await fetchSlotById(slotId);
        if (!slotActual) throw new Error("No se encontró el slot.");

        // Regla central: un usuario solo puede tener una línea bloqueada a la vez.
        // Antes de bloquear la nueva, libero cualquier bloqueo temporal propio en otra línea.
        await unlockMyTemporaryLocks(slotActual.starting_line_id);

        const slotsLinea = await fetchLineSlotsFresh(slotActual.starting_line_id);
        if (slotsLinea.some(lockIsOther)) {
            throw new Error("Esa línea está siendo seleccionada o reservada por otro usuario.");
        }

        const ids = slotsLinea
            .filter((slot) => String(slot.notes || "") !== "RESERVA_24H_SOCIO")
            .map((slot) => slot.id);

        if (!ids.length) throw new Error("No se encontraron slots para bloquear.");

        const { error } = await db
            .from("line_slots")
            .update({
                locked_by_session: APP.sessionLockId,
                locked_by_player_id: APP.miPlayerId || null,
                lock_expires_at: addMinutesIso(CONFIG.LOCK_MINUTES),
            })
            .in("id", ids);

        if (error) throw error;
        activeLockedLineId = slotActual.starting_line_id;
    }

    async function unlockLineFromSlot(slotId) {
        const slotActual = getSlotById(slotId) || await fetchSlotById(slotId);
        if (!slotActual) return;

        const slotsLinea = await fetchLineSlotsFresh(slotActual.starting_line_id);
        const idsMios = slotsLinea
            .filter(isMyTemporaryLock)
            .map((slot) => slot.id);

        if (!idsMios.length) return;

        const { error } = await db
            .from("line_slots")
            .update({
                locked_by_session: null,
                locked_by_player_id: null,
                lock_expires_at: null,
            })
            .in("id", idsMios);

        if (error) throw error;

        if (String(activeLockedLineId || "") === String(slotActual.starting_line_id)) {
            activeLockedLineId = null;
        }
    }

    // ==============================
    // Validaciones
    // ==============================
    async function validateSlotPriority(slotId) {
        const slotActual = getSlotById(slotId) || await fetchSlotById(slotId);
        if (!slotActual) throw new Error("No se encontró el slot.");

        const slotsLinea = await fetchLineSlotsFresh(slotActual.starting_line_id);

        if (!requiresPartner()) {
            for (let i = 1; i < slotActual.slot_number; i += 1) {
                const anterior = slotsLinea.find((s) => s.slot_number === i);
                if (anterior && isSlotEmpty(anterior)) {
                    throw new Error(`No podés ocupar el lugar ${slotActual.slot_number} mientras el lugar ${i} esté libre.`);
                }
            }
            return true;
        }

        const bloqueActual = getPartnerBlock(slotActual.slot_number);
        if (!bloqueActual) throw new Error("No se pudo determinar el bloque de pareja.");

        if (bloqueActual.inicio === 3) {
            const slot1 = slotsLinea.find((s) => s.slot_number === 1);
            const slot2 = slotsLinea.find((s) => s.slot_number === 2);
            if (isSlotEmpty(slot1) && isSlotEmpty(slot2)) {
                throw new Error("No podés ocupar la pareja 3-4 mientras la pareja 1-2 esté libre.");
            }
        }

        return true;
    }

        wrap.style.display = "block";
