<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Torneo Interno</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#eef0ed">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js?v=4"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #eef0ed;
            --card: #fbfbfa;
            --card-2: #f6f6f3;
            --text: #242832;
            --muted: #737b86;
            --line: #dedfd9;
            --accent: #53685c;
            --accent-2: #7c8f83;
            --blue: #6f8197;
            --danger: #9a4444;
            --shadow: 0 10px 28px rgba(35, 40, 45, .08);
            --radius: 20px;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, .9), transparent 360px),
                linear-gradient(180deg, #f4f4f1 0%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .app {
            min-height: 100vh;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
            max-width: 560px;
            margin: 0 auto;
        }

        .desktop-wide {
            max-width: 980px;
        }

        .header {
            padding: 22px 0 14px;
        }

        .eyebrow {
            color: var(--accent-2);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .12em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            margin: 0 0 6px;
            color: var(--accent);
            font-size: 28px;
            line-height: 1.08;
            letter-spacing: -.03em;
        }

        h2,
        .section-title {
            margin: 0 0 16px;
            color: #3f5148;
            font-size: 19px;
            letter-spacing: -.015em;
        }

        .sub {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.35;
        }

        .card {
            background: rgba(251, 251, 250, .96);
            border: 1px solid rgba(222, 223, 217, .85);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .card.soft {
            background: rgba(246, 246, 243, .92);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 14px;
        }

        .field label {
            font-size: 13px;
            font-weight: 800;
            color: #46524b;
        }

        .field input,
        .field select {
            width: 100%;
            padding: 13px 14px;
            border-radius: 14px;
            border: 1px solid #d8d9d3;
            background: #fff;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }

        .field input:focus,
        .field select:focus {
            border-color: #9aaa9e;
            box-shadow: 0 0 0 4px rgba(83, 104, 92, .12);
        }

        button {
            border: none;
            border-radius: 15px;
            padding: 13px 16px;
            cursor: pointer;
            font-weight: 800;
            color: white;
            background: linear-gradient(135deg, #53685c, #6f8175);
            box-shadow: 0 8px 18px rgba(83, 104, 92, .18);
            font-size: 14px;
        }

        button:hover {
            opacity: .94;
        }

        button:active {
            transform: translateY(1px);
        }

        .secondary,
        button.secondary {
            background: linear-gradient(135deg, #727984, #8d949d);
        }

        .blue,
        .btn-enter,
        button.blue {
            background: linear-gradient(135deg, #667891, #8798ac);
        }

        .danger {
            background: linear-gradient(135deg, #8f4b4b, #ad6868);
        }

        .hidden {
            display: none !important;
        }

        .status,
        .estado {
            margin-top: 12px;
            font-weight: 800;
            font-size: 14px;
        }

        .ok,
        .open {
            color: #52705d;
            font-weight: 800;
        }

        .error,
        .expired {
            color: var(--danger);
            font-weight: 800;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .search-results {
            border: 1px solid #d8d9d3;
            border-radius: 14px;
            margin-top: 6px;
            background: #fff;
            max-height: 230px;
            overflow-y: auto;
        }

        .search-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #eeeeea;
            font-size: 14px;
        }

        .search-item:hover {
            background: #f5f5f1;
        }

        .swipe-hint {
            text-align: center;
            color: #9aa0a6;
            font-size: 12px;
            margin: 16px 0 8px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        thead {
            display: none;
        }

        tbody tr {
            display: block;
            background: #fff;
            border: 1px solid #e3e3dd;
            border-radius: 18px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 6px 18px rgba(35, 40, 45, .05);
        }

        tbody td {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            border: 0;
            padding: 7px 0;
            text-align: right;
            font-size: 14px;
        }

        tbody td::before {
            content: attr(data-label);
            font-weight: 800;
            color: #667064;
            text-align: left;
        }

        tbody td:first-child {
            display: block;
            text-align: left;
            font-size: 15px;
            font-weight: 800;
            color: #252a32;
            padding-bottom: 9px;
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
        }

        tbody td:first-child::before {
            content: "";
            display: none;
        }

        tbody td:last-child {
            justify-content: flex-end;
            padding-top: 10px;
        }

        tbody td:last-child::before {
            content: "";
            display: none;
        }

        tbody td button {
            width: 100%;
            margin-top: 4px;
        }

        @media (min-width: 760px) {
            .app {
                max-width: 1040px;
                padding-left: 22px;
                padding-right: 22px;
            }

            .app.narrow {
                max-width: 640px;
            }

            .form-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }

            table {
                border-collapse: collapse;
                border-spacing: 0;
            }

            thead {
                display: table-header-group;
            }

            tbody tr {
                display: table-row;
                background: transparent;
                border: 0;
                border-radius: 0;
                padding: 0;
                box-shadow: none;
                margin: 0;
            }

            tbody td,
            th {
                display: table-cell;
                border-bottom: 1px solid #e5e5df;
                padding: 12px 10px;
                text-align: left;
                vertical-align: middle;
            }

            tbody td::before {
                content: "";
                display: none;
            }

            tbody td:first-child {
                display: table-cell;
                border-bottom: 1px solid #e5e5df;
                margin: 0;
                padding: 12px 10px;
                font-size: 14px;
            }

            tbody td:last-child {
                display: table-cell;
            }

            tbody td button {
                width: auto;
                margin-top: 0;
            }

            th {
                color: #53685c;
                font-size: 13px;
            }
        }

        .podio-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>
    <main class="app">
        <section id="cardPassword" class="card" style="margin-top:22px;">
            <div class="eyebrow">Acceso privado</div>
            <h1>Ingresar al torneo</h1>
            <div class="sub">Escribí la contraseña del torneo para ver la tarjeta y el leaderboard.</div>
            <div class="field" style="margin-top:16px;"><label>Contraseña</label><input id="password"
                    autocomplete="off"></div>
            <button id="btnEntrar">Entrar</button>
            <div id="estadoPassword" class="status"></div>
        </section>
        <section id="contenido" class="hidden">
            <div id="cardPodio" class="card hidden">
                <h2>Resultado final</h2>
                <div id="podioContenido"></div>
            </div>
            <header class="header">
                <div class="eyebrow">Torneo interno</div>
                <h1 id="titulo"></h1>
                <div class="sub" id="subtitulo"></div>
                <div id="avisoEstadoTorneo" class="status"></div>
            </header>
            <div class="card" id="cardAnotarse">
                <h2>Anotarse</h2>
                <div id="contenedorPareja" class="hidden">
                    <div class="field"><label>Buscar compañero</label><input id="buscarJugador" autocomplete="off">
                    </div>
                    <div id="resultadosBusqueda" class="search-results hidden"></div>
                </div>
                <button id="btnAnotarme">Anotarme</button>
                <div id="estadoInscripcion" class="status"></div>
            </div>
            <div class="card hidden" id="cardFinalizar">
                <h2>Administración torneo</h2><button id="btnFinalizar" class="danger">Finalizar torneo</button>
                <div id="estadoFinalizar" class="status"></div>
            </div>
            <div class="card soft">
                <h2>Leaderboard</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Jugador</th>
                            <th>Gross</th>
                            <th>Neto</th>
                            <th>Putts</th>
                            <th>Estado</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard"></tbody>
                </table>
            </div>
            <div class="swipe-hint">Deslizá hacia la derecha para volver a torneos internos</div>
        </section>
    </main>
    <script>

        function configurarSwipeNavegacion({ izquierda, derecha, resolverDerecha, resolverIzquierda }) {
            let startX = 0;
            let startY = 0;
            let tracking = false;

            document.addEventListener("touchstart", (e) => {
                const target = e.target;
                if (target.closest("input, select, textarea, button, .search-results")) return;
                const t = e.changedTouches[0];
                startX = t.clientX;
                startY = t.clientY;
                tracking = true;
            }, { passive: true });

            document.addEventListener("touchend", (e) => {
                if (!tracking) return;
                tracking = false;
                const t = e.changedTouches[0];
                const dx = t.clientX - startX;
                const dy = t.clientY - startY;
                if (Math.abs(dx) < 80 || Math.abs(dx) < Math.abs(dy) * 1.4) return;
                if (dx > 0) {
                    const destino = resolverDerecha ? resolverDerecha() : derecha;
                    if (destino) window.location.href = destino;
                } else {
                    const destino = resolverIzquierda ? resolverIzquierda() : izquierda;
                    if (destino) window.location.href = destino;
                }
            }, { passive: true });
        }

        configurarSwipeNavegacion({ derecha: "torneos_internos.html" });

        const params =
            new URLSearchParams(window.location.search);

        const torneoId =
            params.get("id");

        let torneo = null;
        let usuario = null;
        let compañeroSeleccionado = null;

        async function exigirLogin() {

            const { data: { session } } =
                await db.auth.getSession();

            if (!session) {
                window.location.href = "login.html";
                return;
            }

            usuario = session.user;

        }

        async function cargarTorneo() {

            const { data, error } =
                await db
                    .from("internal_tournaments")
                    .select(`
      *,
      game_modes(name)
    `)
                    .eq("id", torneoId)
                    .maybeSingle();

            if (error || !data) {
                alert("Torneo no encontrado.");
                return;
            }

            torneo = data;

        }

        function esModalidadPareja(nombreModalidad) {
            const m = String(nombreModalidad || "")
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "");

            return (
                m.includes("fourball") ||
                m.includes("four ball") ||
                m.includes("4ball") ||
                m.includes("4 ball") ||
                m.includes("americana") ||
                m.includes("clasico") ||
                m.includes("clasica") ||
                m.includes("pareja")
            );
        }

        function torneoEstaBloqueado() {
            const vencido =
                torneo.expires_at &&
                new Date(torneo.expires_at) < new Date();

            const finalizado =
                torneo.status === "finished";

            return {
                bloqueado: vencido || finalizado,
                vencido,
                finalizado
            };
        }

        function aplicarBloqueoTorneo() {
            const estado =
                torneoEstaBloqueado();

            const aviso =
                document.getElementById("avisoEstadoTorneo");

            if (estado.finalizado) {
                aviso.textContent = "Torneo finalizado.";
                aviso.className = "status ok";

                document.getElementById("cardAnotarse")
                    .classList.add("hidden");

                document.getElementById("cardFinalizar")
                    .classList.add("hidden");

                return;
            }

            if (estado.vencido) {
                aviso.textContent = "Torneo expirado. Ya pasaron las 36 hs.";
                aviso.className = "status error";

                document.getElementById("cardAnotarse")
                    .classList.add("hidden");

                document.getElementById("cardFinalizar")
                    .classList.add("hidden");

                return;
            }

            aviso.textContent = "Torneo abierto.";
            aviso.className = "status ok";
        }

        document.getElementById("btnEntrar")
            .addEventListener("click", async () => {

                const password =
                    document.getElementById("password")
                        .value
                        .trim();

                const estado =
                    document.getElementById("estadoPassword");

                if (password !== torneo.access_password) {

                    estado.textContent =
                        "Contraseña incorrecta.";

                    estado.className =
                        "status error";

                    return;
                }

                document.getElementById("cardPassword")
                    .classList.add("hidden");

                document.getElementById("contenido")
                    .classList.remove("hidden");

                document.getElementById("titulo")
                    .textContent = torneo.name;

                document.getElementById("subtitulo")
                    .textContent =
                    torneo.game_modes?.name || "";

                if (esModalidadPareja(torneo.game_modes?.name)) {
                    document.getElementById("contenedorPareja")
                        .classList.remove("hidden");
                }

                aplicarBloqueoTorneo();

                await cargarLeaderboard();

                await renderPodio();

                const estadoBloqueo =
                    torneoEstaBloqueado();

                if (
                    torneo.created_by === usuario.id &&
                    !estadoBloqueo.bloqueado
                ) {
                    document.getElementById("cardFinalizar")
                        .classList.remove("hidden");
                }

            });

        document.getElementById("buscarJugador")
            .addEventListener("input", async (e) => {

                const q =
                    e.target.value.trim();

                const box =
                    document.getElementById("resultadosBusqueda");

                if (q.length < 2) {
                    box.classList.add("hidden");
                    return;
                }

                const { data, error } =
                    await db
                        .from("players")
                        .select(`
      id,
      full_name,
      current_index,
      aag_member_number
    `)
                        .ilike("search_text", `%${q}%`)
                        .limit(10);

                if (error) {
                    console.error(error);
                    return;
                }

                box.innerHTML =
                    (data || []).map(p => `

      <div class="search-item"
        onclick="seleccionarJugador(
          '${p.id}',
          '${p.full_name.replace(/'/g, "")}'
        )">

        ${p.full_name}
        (${p.current_index || 0})

      </div>

    `).join("");

                box.classList.remove("hidden");

            });

        window.seleccionarJugador =
            function (id, nombre) {

                compañeroSeleccionado = {
                    id,
                    nombre
                };

                document.getElementById("buscarJugador")
                    .value = nombre;

                document.getElementById("resultadosBusqueda")
                    .classList.add("hidden");

            }

        function roundHalfUp(num) {
            return Math.floor(Number(num) + 0.5);
        }

        function calcularHcpJuego(index, categoria, segmento) {
            const idx = Number(index || 0);
            const slope = Number(categoria.slope || 113);
            const rating = Number(categoria.course_rating || 0);
            const par = Number(categoria.par || 0);

            const indexUsado =
                segmento === "18"
                    ? idx
                    : idx / 2;

            const hcp =
                (indexUsado * (slope / 113)) + (rating - par);

            return Math.min(54, roundHalfUp(hcp));
        }

        async function buscarCategoriaParaJugador(jugador) {
            const index = Number(jugador.current_index || 0);
            const gender = jugador.gender;

            const { data, error } = await db
                .from("internal_tournament_categories")
                .select("*")
                .eq("internal_tournament_id", torneo.id)
                .eq("gender", gender)
                .lte("index_min", index)
                .gte("index_max", index)
                .order("display_order", { ascending: true })
                .limit(1)
                .maybeSingle();

            if (error) throw error;

            return data;
        }

        async function buscarJugadorPorId(playerId) {
            const { data, error } = await db
                .from("players")
                .select("*")
                .eq("id", playerId)
                .maybeSingle();

            if (error) throw error;
            return data;
        }

        function calcularHcpFourballClasico(hcp1, hcp2) {
            let a = Number(hcp1 || 0);
            let b = Number(hcp2 || 0);

            const menor = Math.min(a, b);
            const mayor = Math.max(a, b);

            const mayorAjustado = Math.min(mayor, menor + 5);

            const sumaAjustada = menor + mayorAjustado;

            return roundHalfUp(sumaAjustada * 0.375);
        }

        document.getElementById("btnAnotarme")
            .addEventListener("click", async () => {

                const estado =
                    document.getElementById("estadoInscripcion");

                try {

                    const { data: jugador } =
                        await db
                            .from("players")
                            .select("*")
                            .eq("profile_id", usuario.id)
                            .maybeSingle();

                    if (!jugador) {
                        estado.textContent = "No existe jugador asociado.";
                        estado.className = "status error";
                        return;
                    }

                    const modalidadNombre =
                        String(torneo.game_modes?.name || "")
                            .toLowerCase();

                    const esFourball =
                        esModalidadPareja(torneo.game_modes?.name);

                    const esAmericana =
                        modalidadNombre.includes("americana");

                    const esClasico =
                        modalidadNombre.includes("clasico") ||
                        modalidadNombre.includes("clásico");

                    if (esFourball && !compañeroSeleccionado) {
                        estado.textContent = "Seleccioná compañero.";
                        estado.className = "status error";
                        return;
                    }

                    const categoriaJugador =
                        await buscarCategoriaParaJugador(jugador);

                    if (!categoriaJugador) {
                        estado.textContent = "No se encontró categoría para tu índice/género.";
                        estado.className = "status error";
                        return;
                    }

                    const segmento =
                        torneo.hole_segment || "18";

                    let playingHandicap =
                        calcularHcpJuego(
                            jugador.current_index,
                            categoriaJugador,
                            segmento
                        );

                    let partner = null;
                    let partnerPlayingHandicap = null;
                    let teamPlayingHandicap = null;

                    if (esFourball) {

                        partner =
                            await buscarJugadorPorId(compañeroSeleccionado.id);

                        if (!partner) {
                            estado.textContent = "No se encontró el compañero.";
                            estado.className = "status error";
                            return;
                        }

                        const categoriaPartner =
                            await buscarCategoriaParaJugador(partner);

                        if (!categoriaPartner) {
                            estado.textContent = "No se encontró categoría para el compañero.";
                            estado.className = "status error";
                            return;
                        }

                        partnerPlayingHandicap =
                            calcularHcpJuego(
                                partner.current_index,
                                categoriaPartner,
                                segmento
                            );

                        if (esAmericana) {
                            playingHandicap =
                                roundHalfUp(playingHandicap * 0.85);

                            partnerPlayingHandicap =
                                roundHalfUp(partnerPlayingHandicap * 0.85);

                            teamPlayingHandicap =
                                null;
                        }

                        if (esClasico) {
                            teamPlayingHandicap =
                                calcularHcpFourballClasico(
                                    playingHandicap,
                                    partnerPlayingHandicap
                                );
                        }
                    }

                    const payload = {

                        internal_tournament_id:
                            torneo.id,

                        category_id:
                            categoriaJugador.id,

                        player_id:
                            jugador.id,

                        display_name:
                            jugador.full_name,

                        aag_member_number:
                            jugador.aag_member_number,

                        official_index:
                            jugador.current_index,

                        playing_handicap:
                            playingHandicap,

                        tee_id:
                            categoriaJugador.tee_id,

                        card_type:
                            esFourball
                                ? "team"
                                : "individual",

                        loaded_by:
                            usuario.id,

                        partner_player_id:
                            esFourball
                                ? partner.id
                                : null,

                        partner_display_name:
                            esFourball
                                ? partner.full_name
                                : null,

                        partner_aag_member_number:
                            esFourball
                                ? partner.aag_member_number
                                : null,

                        partner_official_index:
                            esFourball
                                ? partner.current_index
                                : null,

                        partner_playing_handicap:
                            esFourball
                                ? partnerPlayingHandicap
                                : null,

                        team_playing_handicap:
                            esFourball
                                ? teamPlayingHandicap
                                : null

                    };

                    const { error } =
                        await db
                            .from("internal_scorecards")
                            .insert(payload);

                    if (error) {
                        console.error(error);

                        estado.textContent =
                            "Error anotando. Puede que ya estés anotado.";

                        estado.className =
                            "status error";

                        return;
                    }

                    estado.textContent =
                        "Inscripción correcta.";

                    estado.className =
                        "status ok";

                    await cargarLeaderboard();

                } catch (error) {

                    console.error(error);

                    estado.textContent =
                        error?.message || "Error calculando la inscripción.";

                    estado.className =
                        "status error";

                }

            });

        async function cargarLeaderboard() {

            const { data, error } =
                await db
                    .from("internal_scorecards")
                    .select("*")
                    .eq("internal_tournament_id", torneo.id)
                    .order("net", { ascending: true });

            if (error) {
                console.error(error);
                return;
            }

            document.getElementById("leaderboard")
                .innerHTML =
                (data || []).map(s => `

        <tr>

          <td>
  ${s.card_type === "team"
                        ? (
                            s.team_playing_handicap !== null &&
                            s.team_playing_handicap !== undefined
                        )
                            ? `${s.display_name} / ${s.partner_display_name || ""} (${s.team_playing_handicap})`
                            : `${s.display_name} (${s.playing_handicap ?? "-"}) / ${s.partner_display_name || ""} (${s.partner_playing_handicap ?? "-"})`
                        : `${s.display_name} (${s.playing_handicap ?? "-"})`
                    }
</td>

          <td data-label="Gross">${s.gross || "-"}</td>

          <td data-label="Neto">${s.net || "-"}</td>

          <td data-label="Putts">${s.total_putts ?? "-"}</td>

          <td data-label="Estado">

            ${!s.gross
                        ? "Pendiente"
                        : s.card_status === "submitted"
                            ? "Finalizada"
                            : "En carga"
                    }

            </td>
          
          <td>

            ${s.loaded_by === usuario.id && !torneoEstaBloqueado().bloqueado
                        ? `
                <button
                  class="secondary"
                  onclick="cargarTarjeta('${s.id}')"
                >
                  Cargar tarjeta
                </button>
              `
                        : ""
                    }

          </td>

        </tr>

      `).join("");

        }

        async function renderPodio() {

            if (torneo.status !== "finished") {
                return;
            }

            const ids = [
                torneo.winner_scorecard_id,
                torneo.second_scorecard_id,
                torneo.third_scorecard_id
            ].filter(Boolean);

            if (ids.length === 0) {
                return;
            }

            const { data, error } =
                await db
                    .from("internal_scorecards")
                    .select("*")
                    .in("id", ids);

            if (error) {
                console.error(error);
                return;
            }

            const mapa = {};

            (data || []).forEach(s => {
                mapa[s.id] = s;
            });

            const ganador =
                mapa[torneo.winner_scorecard_id];

            const segundo =
                mapa[torneo.second_scorecard_id];

            const tercero =
                mapa[torneo.third_scorecard_id];

            document.getElementById("cardPodio")
                .classList.remove("hidden");

            document.getElementById("podioContenido")
                .innerHTML = `

      ${ganador
                    ? `
          <div style="margin-bottom:12px;">
            🥇
            <strong>
              ${ganador.card_type === "team"
                        ? ganador.display_name + " / " + ganador.partner_display_name
                        : ganador.display_name
                    }
            </strong>
            (${ganador.net || "-"})
          </div>
        `
                    : ""
                }

      ${segundo
                    ? `
          <div style="margin-bottom:12px;">
            🥈
            <strong>
              ${segundo.card_type === "team"
                        ? segundo.display_name + " / " + segundo.partner_display_name
                        : segundo.display_name
                    }
            </strong>
            (${segundo.net || "-"})
          </div>
        `
                    : ""
                }

      ${tercero
                    ? `
          <div>
            🥉
            <strong>
              ${tercero.card_type === "team"
                        ? tercero.display_name + " / " + tercero.partner_display_name
                        : tercero.display_name
                    }
            </strong>
            (${tercero.net || "-"})
          </div>
        `
                    : ""
                }

  `;

        }

        window.cargarTarjeta =
            function (scorecardId) {

                window.location.href =
                    `cargar_score_interno.html?id=${scorecardId}`;

            }

        document.getElementById("btnFinalizar")
            .addEventListener("click", async () => {

                const estado =
                    document.getElementById("estadoFinalizar");

                try {

                    const { data, error } =
                        await db
                            .from("internal_scorecards")
                            .select("*")
                            .eq("internal_tournament_id", torneo.id)
                            .not("net", "is", null)
                            .order("net", { ascending: true });

                    if (error) throw error;

                    if (!data || data.length === 0) {

                        estado.textContent =
                            "No hay tarjetas cargadas.";

                        estado.className =
                            "status error";

                        return;
                    }

                    const ganador =
                        data[0] || null;

                    const segundo =
                        data[1] || null;

                    const tercero =
                        data[2] || null;

                    const { error: errorFinalizar } =
                        await db
                            .from("internal_tournaments")
                            .update({

                                status: "finished",

                                finished_at:
                                    new Date().toISOString(),

                                winner_scorecard_id:
                                    ganador?.id || null,

                                second_scorecard_id:
                                    segundo?.id || null,

                                third_scorecard_id:
                                    tercero?.id || null

                            })
                            .eq("id", torneo.id);

                    if (errorFinalizar)
                        throw errorFinalizar;

                    estado.textContent =
                        "Torneo finalizado.";

                    estado.className =
                        "status ok";

                    await cargarLeaderboard();

                } catch (err) {

                    console.error(err);

                    estado.textContent =
                        err.message || "Error finalizando.";

                    estado.className =
                        "status error";

                }

            });

        async function init() {

            await exigirLogin();

            await cargarTorneo();

        }

        init();

    </script>

</body>
