<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Cargar tarjeta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#eef0ed">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js?v=4"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #eef0ed;
            --card: #fbfbfa;
            --card-2: #f6f6f3;
            --text: #242832;
            --muted: #737b86;
            --line: #dedfd9;
            --accent: #53685c;
            --accent-2: #7c8f83;
            --blue: #6f8197;
            --danger: #9a4444;
            --shadow: 0 10px 28px rgba(35, 40, 45, .08);
            --radius: 20px;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, .9), transparent 360px),
                linear-gradient(180deg, #f4f4f1 0%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .app {
            min-height: 100vh;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
            max-width: 560px;
            margin: 0 auto;
        }

        .desktop-wide {
            max-width: 980px;
        }

        .header {
            padding: 22px 0 14px;
        }

        .eyebrow {
            color: var(--accent-2);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .12em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            margin: 0 0 6px;
            color: var(--accent);
            font-size: 28px;
            line-height: 1.08;
            letter-spacing: -.03em;
        }

        h2,
        .section-title {
            margin: 0 0 16px;
            color: #3f5148;
            font-size: 19px;
            letter-spacing: -.015em;
        }

        .sub {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.35;
        }

        .card {
            background: rgba(251, 251, 250, .96);
            border: 1px solid rgba(222, 223, 217, .85);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .card.soft {
            background: rgba(246, 246, 243, .92);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 14px;
        }

        .field label {
            font-size: 13px;
            font-weight: 800;
            color: #46524b;
        }

        .field input,
        .field select {
            width: 100%;
            padding: 13px 14px;
            border-radius: 14px;
            border: 1px solid #d8d9d3;
            background: #fff;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }

        .field input:focus,
        .field select:focus {
            border-color: #9aaa9e;
            box-shadow: 0 0 0 4px rgba(83, 104, 92, .12);
        }

        button {
            border: none;
            border-radius: 15px;
            padding: 13px 16px;
            cursor: pointer;
            font-weight: 800;
            color: white;
            background: linear-gradient(135deg, #53685c, #6f8175);
            box-shadow: 0 8px 18px rgba(83, 104, 92, .18);
            font-size: 14px;
        }

        button:hover {
            opacity: .94;
        }

        button:active {
            transform: translateY(1px);
        }

        .secondary,
        button.secondary {
            background: linear-gradient(135deg, #727984, #8d949d);
        }

        .blue,
        .btn-enter,
        button.blue {
            background: linear-gradient(135deg, #667891, #8798ac);
        }

        .danger {
            background: linear-gradient(135deg, #8f4b4b, #ad6868);
        }

        .hidden {
            display: none !important;
        }

        .status,
        .estado {
            margin-top: 12px;
            font-weight: 800;
            font-size: 14px;
        }

        .ok,
        .open {
            color: #52705d;
            font-weight: 800;
        }

        .error,
        .expired {
            color: var(--danger);
            font-weight: 800;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .search-results {
            border: 1px solid #d8d9d3;
            border-radius: 14px;
            margin-top: 6px;
            background: #fff;
            max-height: 230px;
            overflow-y: auto;
        }

        .search-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #eeeeea;
            font-size: 14px;
        }

        .search-item:hover {
            background: #f5f5f1;
        }

        .swipe-hint {
            text-align: center;
            color: #9aa0a6;
            font-size: 12px;
            margin: 16px 0 8px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        thead {
            display: none;
        }

        tbody tr {
            display: block;
            background: #fff;
            border: 1px solid #e3e3dd;
            border-radius: 18px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 6px 18px rgba(35, 40, 45, .05);
        }

        tbody td {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            border: 0;
            padding: 7px 0;
            text-align: right;
            font-size: 14px;
        }

        tbody td::before {
            content: attr(data-label);
            font-weight: 800;
            color: #667064;
            text-align: left;
        }

        tbody td:first-child {
            display: block;
            text-align: left;
            font-size: 15px;
            font-weight: 800;
            color: #252a32;
            padding-bottom: 9px;
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
        }

        tbody td:first-child::before {
            content: "";
            display: none;
        }

        tbody td:last-child {
            justify-content: flex-end;
            padding-top: 10px;
        }

        tbody td:last-child::before {
            content: "";
            display: none;
        }

        tbody td button {
            width: 100%;
            margin-top: 4px;
        }

        @media (min-width: 760px) {
            .app {
                max-width: 1040px;
                padding-left: 22px;
                padding-right: 22px;
            }

            .app.narrow {
                max-width: 640px;
            }

            .form-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }

            table {
                border-collapse: collapse;
                border-spacing: 0;
            }

            thead {
                display: table-header-group;
            }

            tbody tr {
                display: table-row;
                background: transparent;
                border: 0;
                border-radius: 0;
                padding: 0;
                box-shadow: none;
                margin: 0;
            }

            tbody td,
            th {
                display: table-cell;
                border-bottom: 1px solid #e5e5df;
                padding: 12px 10px;
                text-align: left;
                vertical-align: middle;
            }

            tbody td::before {
                content: "";
                display: none;
            }

            tbody td:first-child {
                display: table-cell;
                border-bottom: 1px solid #e5e5df;
                margin: 0;
                padding: 12px 10px;
                font-size: 14px;
            }

            tbody td:last-child {
                display: table-cell;
            }

            tbody td button {
                width: auto;
                margin-top: 0;
            }

            th {
                color: #53685c;
                font-size: 13px;
            }
        }

        .app.narrow {
            max-width: 640px;
        }

        .score-card {
            text-align: center;
        }

        .hoyo-numero {
            font-size: 72px;
            font-weight: 900;
            color: #53685c;
            line-height: 1;
            margin: 8px 0 18px;
            letter-spacing: -.06em;
        }

        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .score-grid .field input {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            padding: 16px;
        }

        .score-control {
            background: #fff;
            border: 1px solid #e1e2dc;
            border-radius: 18px;
            padding: 12px;
            touch-action: pan-x;
            user-select: none;
        }

        .score-control label {
            text-align: center;
            margin-bottom: 4px;
        }

        .step-btn {
            width: 100%;
            padding: 9px;
            border-radius: 12px;
            font-size: 17px;
            line-height: 1;
            background: linear-gradient(135deg, #eef0ed, #e3e5df);
            color: #53685c;
            box-shadow: none;
        }

        .step-btn.down {
            margin-top: 7px;
        }

        .mini-help {
            margin-top: 8px;
            font-size: 11px;
            color: #9aa0a6;
            text-align: center;
            font-weight: 700;
        }

        .nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px;
        }

        #btnGuardar {
            grid-column: 1 / -1;
        }

        .gross-box {
            text-align: center;
            font-size: 20px;
            font-weight: 900;
            color: #53685c;
        }

        .gross-box span {
            font-size: 34px;
            letter-spacing: -.04em;
        }

        .floating-back-btn {

            padding: 0 !important;
            padding-bottom: 0 !important;
            box-shadow: none !important;
            line-height: 0 !important;
            font-family: Arial, sans-serif;

            position: fixed;

            bottom: calc(env(safe-area-inset-bottom) + 14px);
            left: 14px;

            width: 42px;
            height: 42px;

            border-radius: 12px;
            z-index: 9999;

            display: flex;
            align-items: center;
            justify-content: center;

            background: rgba(197, 212, 198, 0.92);
            color: #166534;

            font-size: 22px;
            font-weight: 700;
            line-height: 1;

            padding-bottom: 2px;

            border: none;
            outline: none;

            -webkit-tap-highlight-color: transparent;
        }

        .floating-back-icon {
            display: block;
            line-height: 1;
            transform: translateY(-1px);
        }
        
    </style>
</head>

<body>
    <button class="floating-back-btn" onclick="volverATorneo()">
        <span class="floating-back-icon">&lt;</span>
    </button>
    <main class="app narrow">
        <header class="header">
            <div class="eyebrow">Carga de tarjeta</div>
            <h1 id="titulo"></h1>
            <div class="sub" id="subtitulo"></div>
        </header>
        <section class="card score-card">
            <div class="sub">Hoyo</div>
            <div class="hoyo-numero" id="hoyoNumero">1</div>
            <div class="score-grid">
                <div class="field score-control" id="boxStrokes">
                    <label>Golpes</label>
                    <button type="button" class="step-btn" onclick="cambiarStrokes(1)">▲</button>
                    <input id="strokes" type="number" min="-2" inputmode="numeric" />
                    <button type="button" class="step-btn down" onclick="cambiarStrokes(-1)">▼</button>
                    <div class="mini-help">Arranca en el par</div>
                </div>
                <div class="field score-control" id="boxPutts">
                    <label>Putts</label>
                    <button type="button" class="step-btn" onclick="cambiarPutts(1)">▲</button>
                    <input id="putts" type="number" min="0" placeholder="--" inputmode="numeric" />
                    <button type="button" class="step-btn down" onclick="cambiarPutts(-1)">▼</button>
                    <div class="mini-help">-- si no cargás</div>
                </div>
            </div>
            <div class="nav">
                <button class="secondary" id="btnAnterior">← Anterior</button>
                <button class="blue" id="btnSiguiente">Siguiente →</button>
                <button id="btnGuardar">Guardar tarjeta</button>
            </div>
            <div class="estado" id="estado"></div>
        </section>
        <section class="card soft">
            <div class="gross-box">Gross<br><span id="gross">0</span></div>
        </section>
        <div class="swipe-hint">Deslizá hacia la derecha para volver al torneo</div>
    </main>
    <script>

        function configurarSwipeNavegacion({ izquierda, derecha, resolverDerecha, resolverIzquierda }) {
            let startX = 0;
            let startY = 0;
            let tracking = false;

            document.addEventListener("touchstart", (e) => {
                const target = e.target;
                if (target.closest("input, select, textarea, button, .search-results")) return;
                const t = e.changedTouches[0];
                startX = t.clientX;
                startY = t.clientY;
                tracking = true;
            }, { passive: true });

            document.addEventListener("touchend", (e) => {
                if (!tracking) return;
                tracking = false;
                const t = e.changedTouches[0];
                const dx = t.clientX - startX;
                const dy = t.clientY - startY;
                if (Math.abs(dx) < 80 || Math.abs(dx) < Math.abs(dy) * 1.4) return;
                if (dx > 0) {
                    const destino = resolverDerecha ? resolverDerecha() : derecha;
                    if (destino) window.location.href = destino;
                } else {
                    const destino = resolverIzquierda ? resolverIzquierda() : izquierda;
                    if (destino) window.location.href = destino;
                }
            }, { passive: true });
        }

        configurarSwipeNavegacion({ resolverDerecha: () => scorecard?.internal_tournament_id ? `torneo_interno.html?id=${scorecard.internal_tournament_id}` : "torneos_internos.html" });

        const params =
            new URLSearchParams(window.location.search);

        const scorecardId =
            params.get("id");

        let scorecard = null;

        function volverATorneo() {

            if (scorecard?.internal_tournament_id) {

                window.location.href =
                    `torneo_interno.html?id=${scorecard.internal_tournament_id}`;

                return;
            }

            window.location.href = "torneos_internos.html";
        }

        let hoyoActual = 1;

        let cantidadHoyos = 18;

        let strokesJson = {};

        // Ajustá estos valores si el par real del campo cambia.
        // Para torneos de 9 hoyos se usan los primeros 9 de este listado.
        const PAR_HOYOS = [4, 4, 3, 4, 3, 4, 4, 4, 5, 4, 3, 5, 3, 4, 4, 4, 5, 4];

        function obtenerParHoyo(hoyo) {
            return PAR_HOYOS[hoyo - 1] || 4;
        }

        function leerNumeroInput(id) {
            const valor = document.getElementById(id).value;
            if (valor === "" || valor === null || valor === undefined) return null;
            const n = Number(valor);
            return Number.isFinite(n) ? n : null;
        }

        window.cambiarStrokes = function (delta) {
            const input = document.getElementById("strokes");
            const actual = leerNumeroInput("strokes") ?? obtenerParHoyo(hoyoActual);
            input.value = Math.max(-2, actual + delta);
            guardarHoyoLocal();
            calcularGross();
        }

        window.cambiarPutts = function (delta) {
            const input = document.getElementById("putts");
            const actual = leerNumeroInput("putts") ?? 0;
            const nuevo = Math.max(0, actual + delta);
            input.value = nuevo;
            guardarHoyoLocal();
        }

        function configurarSwipeVerticalScore() {
            [
                { id: "boxStrokes", fn: window.cambiarStrokes },
                { id: "boxPutts", fn: window.cambiarPutts }
            ].forEach(cfg => {
                const box = document.getElementById(cfg.id);
                if (!box) return;

                let y0 = 0;
                let x0 = 0;

                box.addEventListener("touchstart", e => {
                    const t = e.changedTouches[0];
                    y0 = t.clientY;
                    x0 = t.clientX;
                }, { passive: true });

                box.addEventListener("touchend", e => {
                    const t = e.changedTouches[0];
                    const dy = t.clientY - y0;
                    const dx = t.clientX - x0;
                    if (Math.abs(dy) < 35 || Math.abs(dy) < Math.abs(dx)) return;
                    cfg.fn(dy < 0 ? 1 : -1);
                }, { passive: true });
            });
        }

        async function cargarScorecard() {

            const { data, error } =
                await db
                    .from("internal_scorecards")
                    .select("*")
                    .eq("id", scorecardId)
                    .maybeSingle();

            if (error) {
                console.error("Error buscando scorecard:", error);
                alert("Error buscando tarjeta.");
                return;
            }

            if (!data) {
                alert("Tarjeta no encontrada.");
                return;
            }

            scorecard = data;

            const { data: torneoData, error: errorTorneo } =
                await db
                    .from("internal_tournaments")
                    .select(`
                id,
                name,
                hole_segment,
                game_modes(name)
            `)
                    .eq("id", scorecard.internal_tournament_id)
                    .maybeSingle();

            if (errorTorneo) {
                console.error("Error buscando torneo:", errorTorneo);
                alert("Error buscando torneo.");
                return;
            }

            scorecard.internal_tournaments = torneoData;

            document.getElementById("titulo")
                .textContent =
                scorecard.card_type === "team"
                    ? `${scorecard.display_name} / ${scorecard.partner_display_name || ""}`
                    : scorecard.display_name;

            document.getElementById("subtitulo")
                .textContent =
                scorecard.internal_tournaments?.name || "";

            const segmento =
                scorecard.internal_tournaments?.hole_segment;

            cantidadHoyos =
                segmento === "18"
                    ? 18
                    : 9;

            strokesJson =
                scorecard.strokes || {};

            calcularGross();

            renderHoyo();

        }

        function renderHoyo() {

            document.getElementById("hoyoNumero")
                .textContent = hoyoActual;

            const hoyo =
                strokesJson[hoyoActual] || {};

            const parSugerido = obtenerParHoyo(hoyoActual);

            // Si el hoyo no tenía golpes cargados, muestra el par sugerido.
            document.getElementById("strokes")
                .value =
                hoyo.strokes ?? parSugerido;

            // Putts queda vacío y se ve como -- por el placeholder.
            document.getElementById("putts")
                .value =
                hoyo.putts ?? "";

            document.getElementById("estado").textContent = "";

        }

        function guardarHoyoLocal() {

            const strokes = leerNumeroInput("strokes");
            const putts = leerNumeroInput("putts");

            strokesJson[hoyoActual] = {

                strokes:
                    strokes ?? obtenerParHoyo(hoyoActual),

                putts:
                    putts

            };

        }

        function calcularGross() {

            let gross = 0;

            Object.values(strokesJson)
                .forEach(h => {

                    gross +=
                        Number(h.strokes || 0);

                });

            document.getElementById("gross")
                .textContent = gross;

            return gross;

        }

        function calcularPutts() {

            let putts = 0;

            Object.values(strokesJson)
                .forEach(h => {

                    putts +=
                        Number(h.putts || 0);

                });

            return putts;

        }

        async function guardarSupabase() {

            guardarHoyoLocal();

            const gross =
                calcularGross();

            const totalPutts =
                calcularPutts();

            const modalidadNombre =
                String(
                    scorecard.internal_tournaments?.game_modes?.name || ""
                ).toLowerCase();

            const esAmericana =
                modalidadNombre.includes("americana");

            const esClasico =
                modalidadNombre.includes("clasico") ||
                modalidadNombre.includes("clásico");

            let net = gross;

            if (scorecard.card_type === "team") {

                if (esAmericana) {

                    // Ya carga score neto hoyo por hoyo
                    net = gross;

                } else if (esClasico) {

                    net =
                        gross -
                        Number(scorecard.team_playing_handicap || 0);

                } else {

                    net =
                        gross -
                        Number(scorecard.team_playing_handicap || 0);

                }

            } else {

                net =
                    gross -
                    Number(scorecard.playing_handicap || 0);

            }

            const { error } =
                await db
                    .from("internal_scorecards")
                    .update({

                        strokes:
                            strokesJson,

                        gross,

                        net,

                        total_putts: totalPutts,

                        card_status:
                            "submitted"

                    })
                    .eq("id", scorecard.id);

            if (error) {

                console.error(error);

                document.getElementById("estado")
                    .textContent =
                    "Error guardando.";

                document.getElementById("estado")
                    .className =
                    "estado error";

                return false;
            }

            document.getElementById("estado")
                .textContent =
                "Guardado.";

            document.getElementById("estado")
                .className =
                "estado ok";

            return true;

        }

        document.getElementById("strokes").addEventListener("input", () => {
            const v = leerNumeroInput("strokes");
            if (v != null && v < -2) document.getElementById("strokes").value = -2;
            guardarHoyoLocal();
            calcularGross();
        });

        document.getElementById("putts").addEventListener("input", () => {
            const v = leerNumeroInput("putts");
            if (v != null && v < 0) document.getElementById("putts").value = 0;
            guardarHoyoLocal();
        });

        configurarSwipeVerticalScore();

        document.getElementById("btnGuardar")
            .addEventListener("click", async () => {

                await guardarSupabase();

            });

        document.getElementById("btnAnterior")
            .addEventListener("click", async () => {

                guardarHoyoLocal();

                if (hoyoActual > 1) {

                    hoyoActual--;

                    renderHoyo();

                }

            });

        document.getElementById("btnSiguiente")
            .addEventListener("click", async () => {

                guardarHoyoLocal();

                if (hoyoActual < cantidadHoyos) {

                    hoyoActual++;

                    renderHoyo();

                }

            });

        async function init() {

            await cargarScorecard();

        }

        init();

    </script>

</body>

</html>
