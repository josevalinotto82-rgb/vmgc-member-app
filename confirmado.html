<!DOCTYPE html>
<html lang="es">

<head>

    <title>Cuenta confirmada</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body
    style="font-family:Arial;background:#f5f8f3;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;">

        style="background:white;padding:28px;border-radius:14px;box-shadow:0 5px 20px rgba(0,0,0,.1);width:340px;text-align:center;">
        <h2 style="color:#166534;">Cuenta confirmada</h2>
        <p>Tu cuenta fue confirmada correctamente.</p>
        <p>Ya podés ingresar a la app.</p>
        <button onclick="window.location.href='login.html'"
            style="width:100%;padding:11px;border:none;border-radius:8px;background:#166534;color:white;font-weight:bold;">

        </button>

    <script>
        setTimeout(() => {
            window.location.href = "login.html";
        }, 4000);
