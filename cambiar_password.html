<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cambiar contraseña - VMGC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#166534">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f8f3;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            width: 340px;
        }

        h2 {
            margin: 0 0 12px;
            color: #166534;
            text-align: center;
        }

        .sub {
            color: #6b7280;
            font-size: 14px;
            text-align: center;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #166534;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .msg {
            margin-top: 12px;
            font-size: 13px;
            text-align: center;
            line-height: 1.4;
        }

        .error {
            color: #b91c1c;
        }

        .ok {
            color: #166534;
            font-weight: bold;
        }

        .link {
            display: block;
            margin-top: 14px;
            text-align: center;
            color: #6b7280;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Nueva contraseña</h2>
        <div class="sub">Ingresá tu nueva contraseña para acceder a la app.</div>

        <input id="password" type="password" placeholder="Nueva contraseña">

        <button id="btnCambiar">
            Guardar nueva contraseña
        </button>

        <div id="msg" class="msg"></div>

        <a class="link" href="login.html">Volver al ingreso</a>
    </div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

        const supabase = createClient(
            "https://bnnfolhrqxgxjmobclrm.supabase.co",
            "sb_publishable_pNxU4AFpAZPpeJ0wICLvIw_6nW90njQ"
        );

        const msg = document.getElementById("msg");
        const btn = document.getElementById("btnCambiar");

        async function prepararRecovery() {
            const queryParams = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.replace("#", "?"));

            const code = queryParams.get("code");
            const errorCode = hashParams.get("error_code") || queryParams.get("error_code");
            const errorDescription = hashParams.get("error_description") || queryParams.get("error_description");

            if (errorCode) {
                msg.className = "msg error";
                msg.textContent = errorDescription
                    ? decodeURIComponent(errorDescription.replaceAll("+", " "))
                    : "El enlace ya no es válido o expiró. Pedí uno nuevo.";
                return;
            }

            if (code) {
                const { error } = await supabase.auth.exchangeCodeForSession(code);

                if (error) {
                    msg.className = "msg error";
                    msg.textContent = "El enlace ya no es válido o expiró. Pedí uno nuevo.";
                    return;
                }

                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        prepararRecovery();

        document.getElementById("btnCambiar").addEventListener("click", async () => {
            const password = document.getElementById("password").value;

            msg.textContent = "";
            msg.className = "msg";

            if (!password || password.length < 6) {
                msg.className = "msg error";
                msg.textContent = "La contraseña debe tener al menos 6 caracteres.";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Guardando...";

            const { error } = await supabase.auth.updateUser({
                password
            });

            if (error) {
                let mensaje = "Ocurrió un error.";

                if (error.message.includes("different from the old password")) {
                    mensaje = "La nueva contraseña no puede ser igual a la anterior.";
                } else if (error.message.includes("Password should be at least")) {
                    mensaje = "La contraseña debe tener al menos 6 caracteres.";
                } else if (error.message.includes("Invalid token")) {
                    mensaje = "El enlace ya no es válido o expiró. Pedí uno nuevo.";
                } else {
                    mensaje = error.message;
                }

                msg.className = "msg error";
                msg.textContent = mensaje;

                btn.disabled = false;
                btn.textContent = "Guardar nueva contraseña";
                return;
            }

            msg.className = "msg ok";
            msg.textContent = "Contraseña actualizada correctamente.";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        });

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("./sw.js");
        }
    </script>
</body>

</html>
