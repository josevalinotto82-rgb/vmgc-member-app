<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#166534">
    <meta charset="UTF-8">
    <title>Anotarme a un torneo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js?v=5"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f8f3;
            color: #1f2937;
        }

        .app {
            min-height: 100vh;
            padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 24px);
            max-width: 560px;
            margin: 0 auto;
        }

        .header {
            padding: 22px 0 14px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            width: 58px;
            height: 58px;
            object-fit: contain;
        }

        .club {
            font-size: 22px;
            font-weight: 800;
            color: #3e5740;
            line-height: 1.1;
        }

        .title-card {
            background: white;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 5px 18px rgba(0, 0, 0, .08);
            margin-bottom: 16px;
        }

        .title-card h1 {
            margin: 0 0 6px;
            font-size: 22px;
            color: #166534;
        }

        .title-card p {
            margin: 0;
            color: #6b7280;
            font-size: 14px;
            line-height: 1.35;
        }

        .torneos {
            display: grid;
            gap: 14px;
        }

        .torneo-card {
            width: 100%;
            border: none;
            text-align: left;
            background: white;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 5px 18px rgba(0, 0, 0, .08);
            border-left: 6px solid #166534;
            cursor: pointer;
        }

        .torneo-card:active {
            transform: scale(.99);
        }

        .torneo-fecha {
            display: inline-block;
            background: #ecfdf5;
            color: #166534;
            font-size: 15px;
            font-weight: 900;
            padding: 7px 11px;
            border-radius: 999px;
            margin-bottom: 10px;
        }

        .torneo-nombre {
            font-size: 19px;
            font-weight: 900;
            color: #111827;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .torneo-meta {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .lugares {
            background: #ecfdf5;
            color: #166534;
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 900;
        }

        .empty,
        .error {
            background: white;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 5px 18px rgba(0, 0, 0, .08);
            color: #6b7280;
            line-height: 1.35;
        }

        .error {
            color: #991b1b;
            border-left: 6px solid #b91c1c;
        }

        .back {
            margin-top: 18px;
            width: 100%;
            border: none;
            background: #e5e7eb;
            color: #111827;
            padding: 13px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <main class="app">

        <div class="header">
            <img src="escudo.png" class="logo" alt="VMGC">
            <div>
                <div class="club">Villa María Golf Club</div>
            </div>
        </div>

        <section class="title-card">
            <h1>Anotarme a un torneo</h1>
            <p>Elegí el torneo disponible y después seleccioná tu horario en la grilla de juego.</p>
        </section>

        <section id="torneos" class="torneos">
            <div class="empty">Cargando torneos disponibles...</div>
        </section>

        <button class="back" onclick="window.location.href='panel.html'">Volver al panel</button>

    </main>

    <script>
        function safeText(valor) {
            return String(valor ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function formatFecha(fechaStr) {
            if (!fechaStr) return "";
            const [year, month, day] = String(fechaStr).split("-").map(Number);
            if (!year || !month || !day) return fechaStr;

            const fecha = new Date(year, month - 1, day);
            const weekday = fecha.toLocaleDateString("es-AR", { weekday: "long" });
            const monthName = fecha.toLocaleDateString("es-AR", { month: "long" });

            const cap = txt => txt.charAt(0).toUpperCase() + txt.slice(1);
            return `${cap(weekday)} ${day} de ${cap(monthName)} de ${year}`;
        }

        function slotLibre(slot) {
            const nombre = String(slot?.display_name || "").trim();
            const tipo = String(slot?.participant_type || "").toLowerCase();
            const notes = String(slot?.notes || "");

            if (tipo === "blocked") return false;
            if (notes === "RESERVA_ADMIN") return false;

            if (notes === "RESERVA_24H_SOCIO") {
                const expira = slot?.lock_expires_at ? new Date(slot.lock_expires_at).getTime() : 0;
                if (expira > Date.now()) return false;
            }

            return !nombre || nombre.toUpperCase() === "LIBRE";
        }

        async function contarLugaresDisponibles(torneoId) {
            const { data: blocks, error: blocksError } = await db
                .from("starting_blocks")
                .select("id")
                .eq("tournament_id", torneoId);

            if (blocksError) throw blocksError;
            const blockIds = (blocks || []).map(b => b.id);
            if (!blockIds.length) return 0;

            const { data: lines, error: linesError } = await db
                .from("starting_lines")
                .select("id")
                .in("starting_block_id", blockIds);

            if (linesError) throw linesError;
            const lineIds = (lines || []).map(l => l.id);
            if (!lineIds.length) return 0;

            const { data: slots, error: slotsError } = await db
                .from("line_slots")
                .select("id, display_name, participant_type, notes, lock_expires_at")
                .in("starting_line_id", lineIds);

            if (slotsError) throw slotsError;

            return (slots || []).filter(slotLibre).length;
        }

        async function cargarTorneos() {
            const cont = document.getElementById("torneos");

            const { data: sessionData } = await db.auth.getSession();

            if (!sessionData.session) {
                window.location.href = "login.html";
                return;
            }

            try {
                const { data: torneos, error } = await db
                    .from("tournaments")
                    .select("id, name, tournament_date, status, published")
                    .eq("status", "open")
                    .eq("published", true)
                    .order("tournament_date", { ascending: true });

                if (error) throw error;

                if (!torneos || torneos.length === 0) {
                    cont.innerHTML = `
                    <div class="empty">
                        No hay torneos abiertos para anotarse en este momento.
                    </div>
                `;
                    return;
                }

                const torneosConLugares = await Promise.all(
                    torneos.map(async torneo => ({
                        ...torneo,
                        lugares: await contarLugaresDisponibles(torneo.id)
                    }))
                );

                cont.innerHTML = torneosConLugares.map(torneo => `
                <button class="torneo-card" onclick="window.location.href='grilla_interactiva.html?torneo_id=${torneo.id}'">
                    <div class="torneo-fecha">${safeText(formatFecha(torneo.tournament_date))}</div>
                    <div class="torneo-nombre">${safeText(torneo.name || "Torneo")}</div>
                    <div class="torneo-meta">
                        <span class="lugares">${torneo.lugares} lugares disponibles</span>
                    </div>
                </button>
            `).join("");

            } catch (err) {
                console.error(err);
                cont.innerHTML = `
                <div class="error">
                    No se pudieron cargar los torneos disponibles.
                </div>
            `;
            }
        }

        cargarTorneos();
    </script>

</body>

</html>
