            background: #f5f8f3;
            border-top: 1px solid #dbe7dd;
            overflow: hidden;

        .sponsor-track {

            align-items: center;
            width: max-content;
            gap: 0;

        }

        .sponsor-track a {

        .sponsor-track span {

        }

        @keyframes sponsorsMove {

            }

        }

        .sponsor-track img {

    <script>
        const CLUB_VMGC = 408;

        function limpiarTexto(valor) {
            return String(valor || "").trim();
        }

        function primerNombre(nombreCompleto) {
            const limpio = limpiarTexto(nombreCompleto);
            if (!limpio) return "";

            let nombres = limpio;

            if (limpio.includes(",")) {
                const partes = limpio.split(",");
                nombres = partes.slice(1).join(" ");
            }

            nombres = limpiarTexto(nombres);

            const palabras = nombres.split(/\s+/).filter(Boolean);

            if (palabras.length >= 2) {
                return `${palabras[0]} ${palabras[1]}`;
            }

            return palabras[0] || "";
        }

        async function buscarPerfil(user) {
            const userId = user.id;
            const email = user.email;

            let profile = null;
            let player = null;

            // 1) Perfil por id de auth.users
            const { data: prof } = await db
                .from("profiles")
                .select("*")
                .eq("id", userId)
                .maybeSingle();

            profile = prof || null;

            // 2) Jugador linkeado por profile_id
            const { data: playerByProfile } = await db
                .from("players")
                .select("*")
                .eq("profile_id", userId)
                .maybeSingle();

            if (playerByProfile) player = playerByProfile;

            // 3) Backup: jugador por email si existe columna email
            if (!player && email) {
                const { data: playerByEmail } = await db
                    .from("players")
                    .select("*")
                    .eq("email", email)
                    .maybeSingle();

                if (playerByEmail) player = playerByEmail;
            }

            return { profile, player };
        }

        function obtenerNombreMostrable(user, profile, player) {
            const candidatos = [
                player?.first_name,
                profile?.first_name,
                profile?.name,
                user?.user_metadata?.first_name,
                user?.user_metadata?.name,
                player?.full_name,
                player?.display_name,
                user?.email
            ];

            for (const c of candidatos) {
                const nombre = primerNombre(c);
                if (nombre && !nombre.includes("@")) return nombre;
            }

            return "socio";
        }

        async function registrarUsoPagina(page, action = "view", extra = {}) {
            try {
                const { data: { user } } = await db.auth.getUser();
                if (!user) return;

                const { data: player } = await db
                    .from("players")
                    .select("id")
                    .eq("profile_id", user.id)
                    .maybeSingle();

                await db.from("app_usage_events").insert({
                    user_id: user.id,
                    player_id: player?.id || null,
                    email: user.email || null,
                    page,
                    action,
                    tournament_id: extra.tournament_id || null,
                    metadata: extra
                });
            } catch (err) {
                console.warn("No se pudo registrar uso:", err);
            }
        }

        async function init() {
            const cachedName = localStorage.getItem("vmgc_nombre_socio");

            if (cachedName) {
                document.getElementById("welcomeTitle").textContent = `Bienvenido/a ${cachedName}`;
                document.getElementById("memberName").textContent = "Usuario";
            }

            const { data, error } = await db.auth.getSession();

            if (error || !data.session) {
                window.location.href = "login.html";
                return;
            }

            const user = data.session.user;
            await registrarUsoPagina("panel", "view");
            const { profile, player } = await buscarPerfil(user);
            const nombre = obtenerNombreMostrable(user, profile, player);

            localStorage.setItem("vmgc_nombre_socio", nombre);

            document.getElementById("welcomeTitle").textContent = `Bienvenido/a ${nombre}`;
            document.getElementById("memberName").textContent = "Usuario";
        }

        document.getElementById("btnLogout").addEventListener("click", async () => {
            await db.auth.signOut();
            window.location.href = "login.html";
        });

        init();
    </script>

    <script>
        window.addEventListener("load", () => {
            const track = document.querySelector(".sponsor-track");
            if (!track || track.dataset.clonado === "true") return;

            const original = track.innerHTML;
            track.innerHTML = original + original;
            track.dataset.clonado = "true";

            track.style.animation = "none";
            track.offsetHeight;
            track.style.animation = "sponsorsMove 30s linear infinite";
        });
